<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GAMESHARP · Daily Challenge (prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#0d1a0f;--panel:#101f12;--green:#5bba6f;--gold:#c8a84b;--fig:#e9f0e1;--wrong:#e07070;--line:rgba(255,255,255,.1);
  --eo:cubic-bezier(0.22,1,0.36,1);--es:cubic-bezier(0.34,1.56,0.64,1);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--dark);color:#fff;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:560px;margin:0 auto;padding:0 20px 48px;min-height:100vh;}
.top{display:flex;align-items:center;justify-content:space-between;padding:44px 0 0;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--green);}
.poc{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.28);font-weight:700;}
.fade{animation:fade .42s var(--eo);}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* progress dots */
.dots{display:flex;gap:6px;align-items:center;margin:20px 0 26px;}
.dot{height:6px;border-radius:3px;flex:1;background:rgba(255,255,255,.14);transition:.4s var(--eo);}
.dot.done{background:var(--green);}
.dot.now{background:var(--green);box-shadow:0 0 10px rgba(91,186,111,.55);}
.dot.tech{background:rgba(200,168,75,.3);}
.dot.tech.done,.dot.tech.now{background:var(--gold);}

/* intro / end */
.hero{text-align:left;}
.hero .eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:12px;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:1px;line-height:.96;margin:0 0 14px;}
.hero p{font-size:15px;line-height:1.6;color:rgba(255,255,255,.66);margin:0 0 26px;}
.cta{width:100%;background:var(--green);color:#06140a;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.4px;border:none;border-radius:14px;padding:16px;cursor:pointer;box-shadow:0 6px 22px rgba(91,186,111,.28);transition:transform .15s;}
.cta:active{transform:scale(.98);}
.cta.gold{background:var(--gold);box-shadow:0 6px 22px rgba(200,168,75,.28);}

.qtag{display:inline-block;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:12px;}
.qtag.tactical{color:var(--green);background:rgba(91,186,111,.12);}
.qtag.exec{color:var(--gold);background:rgba(200,168,75,.14);}
.situation{font-size:14px;line-height:1.55;color:rgba(255,255,255,.6);margin-bottom:6px;}
.prompt{font-family:'Bebas Neue',sans-serif;font-size:27px;letter-spacing:.6px;line-height:1.05;margin:6px 0 16px;}

/* court (broadcast) */
.court{position:relative;height:clamp(190px,30vh,240px);max-width:420px;margin:0 auto;border-radius:14px;overflow:hidden;perspective:620px;perspective-origin:50% 32%;background:#0a160c;box-shadow:inset 0 0 30px rgba(0,0,0,.5);}
.court svg{position:absolute;left:50%;bottom:-2px;width:122%;transform:translateX(-50%) rotateX(46deg);transform-origin:50% 100%;filter:drop-shadow(0 8px 14px rgba(0,0,0,.5));}
/* figure (technique) */
.figscene{position:relative;background:radial-gradient(130% 120% at 50% 30%,#16401d,#0e2913 55%,#081710);border-radius:14px;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.5);}
.figscene svg{display:block;width:100%;height:auto;}

.opts{margin-top:16px;}
.opt{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:13px;padding:14px 15px;display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;text-align:left;transition:.18s;}
.opt:active{transform:scale(.99);}
.opt .ol{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--green);flex-shrink:0;}
.opt .otx{flex:1;}
.opt .otl{font-size:14.5px;font-weight:600;color:#fff;}
.opt .osub{font-size:12px;color:rgba(255,255,255,.45);margin-top:1px;}
.opt.sel{border-color:var(--green);background:rgba(91,186,111,.12);box-shadow:0 0 0 1px var(--green);}
.opt.wrong{border-color:var(--wrong);background:rgba(224,112,112,.1);box-shadow:0 0 0 1px var(--wrong);}
.opt.dim{opacity:.34;}
.opt.sel .ol{background:var(--green);color:#06140a;}
.opt.wrong .ol{background:var(--wrong);color:#fff;}

.reveal{margin-top:16px;opacity:0;}
.reveal.show{animation:fade .5s var(--eo) both;}
.rv-tag{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;margin-bottom:8px;}
.rv-body{font-size:14.5px;line-height:1.55;color:#fff;}
.rv-insight{font-size:13px;font-style:italic;color:rgba(255,255,255,.56);line-height:1.5;margin-top:11px;padding-left:12px;border-left:2px solid rgba(200,168,75,.4);}
.rv-cue{margin-top:14px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.26);border-radius:12px;padding:12px 14px;}
.rv-cue .cl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:4px;}
.rv-cue .ct{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.6px;color:#fff;}
.rv-cue .cd{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px;line-height:1.4;}

/* end card */
.endcard{background:linear-gradient(160deg,rgba(91,186,111,.1),rgba(200,168,75,.05));border:1px solid rgba(91,186,111,.25);border-radius:18px;padding:24px 20px;margin-bottom:22px;}
.endcard .score{font-family:'Bebas Neue',sans-serif;font-size:54px;line-height:.9;color:var(--green);}
.endcard .scsub{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:700;margin-top:2px;}
.cue-big{margin:22px 0;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:20px;}
.cue-big .cbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:8px;}
.cue-big .cbt{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.6px;line-height:1.08;color:#fff;}
.cue-big .cbb{font-size:14px;line-height:1.6;color:rgba(255,255,255,.66);margin-top:14px;}
.cue-big .cbb strong{color:var(--green);}
@keyframes cdot{0%,100%{r:8;opacity:.95;}50%{r:12;opacity:.5;}}
.cdot{animation:cdot 1.5s ease-in-out infinite;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand">GAMESHARP · DAILY CHALLENGE</div><div class="poc">Prototype</div></div>
  <div id="app"></div>
</div>

<script>
/* ════════ THEME ════════ */
const THEME = {
  eyebrow: "Today's Challenge · Themed",
  title: "The Serve Under Pressure",
  intro: "Four tight serving moments from one close game. Pick your spots — then find out why the big serves kept missing.",
  endCue: "Trust your toss — then serve to your spot.",
  endBody: "Your serve reads were sharp. The double faults on the big points <strong>weren't your nerve failing your serve — they were your toss</strong> creeping lower under pressure. Groove the toss, and the serves you planned actually land. Brain and body, finally on the same team."
};

/* ════════ COURT (broadcast) helpers ════════ */
function courtMarkings(){return `
  <defs><linearGradient id="cs" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1d5f29"/><stop offset="1" stop-color="#15461f"/></linearGradient></defs>
  <rect x="0" y="0" width="200" height="150" fill="#0a160c"/>
  <rect x="20" y="12" width="160" height="126" fill="url(#cs)"/>
  <rect x="20" y="12" width="22" height="126" fill="rgba(255,255,255,.025)"/><rect x="158" y="12" width="22" height="126" fill="rgba(255,255,255,.025)"/>
  <rect x="20" y="12" width="160" height="126" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/>
  <line x1="42" y1="12" x2="42" y2="138" stroke="rgba(255,255,255,.45)" stroke-width="1"/><line x1="158" y1="12" x2="158" y2="138" stroke="rgba(255,255,255,.45)" stroke-width="1"/>
  <line x1="42" y1="41" x2="158" y2="41" stroke="rgba(255,255,255,.28)" stroke-width="1"/><line x1="42" y1="109" x2="158" y2="109" stroke="rgba(255,255,255,.28)" stroke-width="1"/>
  <line x1="100" y1="41" x2="100" y2="109" stroke="rgba(255,255,255,.26)" stroke-width="1"/>
  <rect x="17" y="71" width="6" height="8" fill="rgba(200,168,75,.4)" rx="1"/><rect x="177" y="71" width="6" height="8" fill="rgba(200,168,75,.4)" rx="1"/>
  <line x1="20" y1="75" x2="180" y2="75" stroke="rgba(255,255,255,.7)" stroke-width="1.7"/>`;}
function arrow(x1,y1,x2,y2,col,w){const a=Math.atan2(y2-y1,x2-x1),L=9;
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w||4}" stroke-linecap="round"/><path d="M${x2},${y2} L${x2-L*Math.cos(a-0.5)},${y2-L*Math.sin(a-0.5)} M${x2},${y2} L${x2-L*Math.cos(a+0.5)},${y2-L*Math.sin(a+0.5)}" stroke="${col}" stroke-width="${w||4}" fill="none" stroke-linecap="round"/>`;}
function courtScene(q, chosen){
  const you=q.you, opp=q.opp, opts=q.options, revealed=chosen!=null, ci=opts.findIndex(o=>o.correct);
  const markers = opts.map((o,i)=>{
    let f='rgba(255,255,255,.16)',s='rgba(255,255,255,.4)',t='rgba(255,255,255,.6)';
    if(revealed){ if(i===chosen){f=o.correct?'rgba(91,186,111,.95)':'rgba(224,82,82,.95)';s='#fff';t='#06140a';}
      else if(i===ci){f='rgba(91,186,111,.9)';s='#fff';t='#06140a';} else {f='rgba(255,255,255,.07)';s='rgba(255,255,255,.18)';t='rgba(255,255,255,.28)';} }
    const pulse=(revealed&&i===ci&&chosen!==ci)?`<animate attributeName="r" values="7;9;7" dur="1s" repeatCount="indefinite"/>`:'';
    return `<circle cx="${o.target.x}" cy="${o.target.y}" r="7" fill="${f}" stroke="${s}" stroke-width="1">${pulse}</circle><text x="${o.target.x}" y="${o.target.y+2.6}" text-anchor="middle" font-size="6.5" font-weight="700" fill="${t}" font-family="DM Sans">${String.fromCharCode(65+i)}</text>`;
  }).join('');
  let act='';
  if(revealed){const o=opts[chosen],tt=o.target,cx=(you.x+tt.x)/2,cy=Math.min(you.y,tt.y)-16;
    act=`<circle r="3.4" fill="${o.correct?'#b6ff8a':'#ff8a8a'}"><animateMotion dur="0.7s" fill="freeze" path="M${you.x},${you.y} Q${cx},${cy} ${tt.x},${tt.y}"/></circle>`;
    if(!o.correct){const c=opts[ci].target,ccx=(you.x+c.x)/2,ccy=Math.min(you.y,c.y)-16;
      act+=`<path d="M${you.x},${you.y} Q${ccx},${ccy} ${c.x},${c.y}" stroke="rgba(91,186,111,.7)" stroke-width="1.6" fill="none" stroke-dasharray="4,3" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.4s" fill="freeze"/></path>`;}
  } else if(q.incoming){const inc=q.incoming,mx=(inc.from.x+inc.to.x)/2,my=Math.min(inc.from.y,inc.to.y)+18;
    act=`<path d="M${inc.from.x},${inc.from.y} Q${mx},${my} ${inc.to.x},${inc.to.y}" stroke="rgba(200,168,75,.45)" stroke-width="1.3" fill="none" stroke-dasharray="3,3"/>`;}
  return `<div class="court"><svg viewBox="0 0 200 150">${courtMarkings()}${act}${markers}
    <circle cx="${opp.x}" cy="${opp.y}" r="5" fill="rgba(255,255,255,.55)"/><text x="${opp.x}" y="${opp.y+12}" text-anchor="middle" font-size="6" fill="rgba(255,255,255,.4)" font-family="DM Sans">OPP</text>
    <circle cx="${you.x}" cy="${you.y}" r="6" fill="rgba(200,168,75,.95)"/><text x="${you.x}" y="${you.y+13}" text-anchor="middle" font-size="6" fill="rgba(200,168,75,.6)" font-family="DM Sans">YOU</text></svg></div>`;
}

/* ════════ FIGURE (technique fault) helpers ════════ */
function limb(a,b,w){return `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="var(--fig)" stroke-width="${w||11}" stroke-linecap="round"/>`;}
// Serving figure. mode 'cramped' = rushed low toss, bent arm; 'reach' = full extension.
function serveFig(mode){
  const reach = mode==='reach';
  const head = reach?[150,84]:[150,92];
  const sh   = reach?[150,110]:[150,116];
  const hip  = [150,176];
  const elb  = reach?[160,80]:[172,100];
  const wr   = reach?[164,52]:[192,104];
  const rkt  = reach?[170,24]:[212,92];
  const oElb = reach?[140,98]:[136,108];
  const oWr  = reach?[126,62]:[120,96];
  const bKnee= reach?[150,242]:[146,236], bAnk= reach?[150,300]:[138,300];
  const fKnee= reach?[160,242]:[166,238], fAnk= reach?[168,300]:[182,300];
  return `<g opacity="0.96">
    ${limb(hip,[bKnee[0],bKnee[1]])}${limb(bKnee,bAnk)}${limb(hip,fKnee)}${limb(fKnee,fAnk)}
    ${limb(sh,hip,12)}${limb(sh,oElb)}${limb(oElb,oWr)}${limb(sh,elb)}${limb(elb,wr)}
    <line x1="${wr[0]}" y1="${wr[1]}" x2="${rkt[0]}" y2="${rkt[1]}" stroke="var(--gold)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="${rkt[0]}" cy="${rkt[1]}" r="13" fill="none" stroke="var(--gold)" stroke-width="3"/>
    <line x1="${sh[0]}" y1="${sh[1]}" x2="${head[0]}" y2="${head[1]+12}" stroke="var(--fig)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="${head[0]}" cy="${head[1]}" r="15" fill="var(--fig)"/></g>`;
}
function techScene(revealed){
  const ground=`<line x1="34" y1="302" x2="266" y2="302" stroke="rgba(255,255,255,.18)" stroke-width="2"/><ellipse cx="150" cy="306" rx="116" ry="9" fill="rgba(0,0,0,.25)"/>`;
  if(!revealed){
    // symptom: rushed low toss (red, low & forward) -> cramped reach -> serve dives into net
    return `<div class="figscene"><svg viewBox="0 0 300 330">${ground}
      ${serveFig('cramped')}
      <circle class="cdot" cx="214" cy="78" r="8" fill="rgba(224,112,112,.95)"/>
      <text x="214" y="62" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">toss drops low &amp; in</text>
      <path d="M214,92 Q244,150 250,250" stroke="rgba(224,112,112,.7)" stroke-width="2.4" fill="none" stroke-dasharray="5,4"/>
      <text x="262" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">into the net</text>
    </svg></div>`;
  }
  // reveal: bad toss (red, low) vs good toss (green, high & at full reach) -> serve goes in
  return `<div class="figscene"><svg viewBox="0 0 300 330">${ground}
    ${serveFig('reach')}
    <circle cx="214" cy="78" r="7" fill="none" stroke="rgba(224,112,112,.85)" stroke-width="2"/>
    <text x="246" y="82" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">too low</text>
    <circle cx="178" cy="24" r="8" fill="rgba(91,186,111,.95)"/>
    <text x="178" y="14" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(91,186,111,.95)" font-family="DM Sans">place it here</text>
    <path d="M174,28 Q150,120 196,250" stroke="rgba(91,186,111,.7)" stroke-width="2.2" fill="none" stroke-dasharray="5,4"/>
    <text x="214" y="232" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(91,186,111,.9)" font-family="DM Sans">in</text>
  </svg></div>`;
}

/* ════════ QUESTIONS (all serve, under pressure) ════════ */
const QUESTIONS = [
  { type:'court', tag:'Read 1 of 4',
    situation:"4–4, deuce. Break point against you. The returner edges across, cheating wide — they're expecting your big slider out wide.",
    prompt:"Where do you serve?",
    you:{x:118,y:130}, opp:{x:46,y:30},
    options:[
      {label:'Big slider out wide',sub:'Your favourite serve',target:{x:50,y:64},correct:false,verdict:"Straight into where they've leaned. Your best serve, served to their strength — they've already told you they're going there."},
      {label:'Down the T',sub:'Into the space they left',target:{x:96,y:52},correct:true,verdict:"Yes. Their feet are a tell — they leaned wide, so the T is wide open. Serve where they aren't, not where you like."},
      {label:'At the body',sub:'Jam them',target:{x:70,y:60},correct:false,verdict:"Not bad — a body serve cramps them. But they've vacated the T entirely; the free space is the bigger reward here."}
    ],
    insight:"The returner's feet tell you where they're going before the ball is struck. Serve the other way." },

  { type:'court', tag:'Read 2 of 4',
    situation:"You held. Now you crack a serve out wide and drag the returner off the court — their block floats back, short and central.",
    prompt:"Where's your plus-one forehand?",
    you:{x:100,y:118}, opp:{x:28,y:44}, incoming:{from:{x:42,y:52},to:{x:100,y:110}},
    options:[
      {label:'Behind them',sub:'Back where they came',target:{x:40,y:28},correct:false,verdict:"They're already scrambling back to the middle — hitting behind them runs the ball into where they're heading. The space is the other way."},
      {label:'Into the open court',sub:'Punish the space',target:{x:150,y:30},correct:true,verdict:"Yes. The wide serve's whole job was to open that court — the plus-one just collects the space it made. Serve and forehand, one pattern."},
      {label:'Drop shot',sub:'Take their legs',target:{x:104,y:60},correct:false,verdict:"A drop throws away the opening your serve just built. You've earned an open court — use it."}
    ],
    insight:"Venus Williams's wide serve was a rehearsed setup: the serve displaces the returner, the forehand punishes the space." },

  { type:'court', tag:'Read 3 of 4',
    situation:"Game point, your favour. All match, your body serve has jammed this returner — 8 of 10, cramped replies every time.",
    prompt:"What's the smart first serve?",
    you:{x:118,y:130}, opp:{x:54,y:30},
    options:[
      {label:'Flat ace down the T',sub:'End it in style',target:{x:96,y:52},correct:false,verdict:"On a closing point, you reach for the serve you haven't grooved — and that's exactly when it misses. Style is not a strategy."},
      {label:'The body serve that\'s working',sub:'Trust what jams them',target:{x:70,y:60},correct:true,verdict:"Right. Go back to the well. The serve that's worked all match is the highest-percentage point on the board — close it with what you trust."},
      {label:'Spin it wide',sub:'Open the court',target:{x:50,y:64},correct:false,verdict:"A fine serve — but you'd be abandoning the one thing that's beaten this returner all day, on the most important point."}
    ],
    insight:"On a closing point, the serve that's been working beats the serve that might be spectacular." },

  { type:'technique', tag:'Execution check',
    situation:"Here's the thing. Three smart serve reads — but on the big points, your first serve kept dying into the net. Double faults at the worst moments.",
    prompt:"What's the usual culprit?",
    options:[
      {label:'You serve too hard',correct:false,verdict:"Pace isn't it — your serve speed is the same on the points you make. The miss isn't in the swing."},
      {label:'Your toss drops lower and drifts in',correct:true,verdict:"This is it — the usual culprit. Under pressure you rush, and the toss creeps lower and in toward you. You can't extend up, so the serve gets cramped and dives into the net. Your serve choice was right; the toss undercut it."},
      {label:'Wrong grip',correct:false,verdict:"Your grip doesn't change between points — it's the same on the serves that go in. The toss is what the nerves move."},
      {label:'You don\'t follow through',correct:false,verdict:"The follow-through breaks down because the contact was already cramped. Fix the toss and the rest of the motion frees up on its own."}
    ],
    cue:{title:'Place the toss — high, slightly in front, same spot every time', drill:"Toss-and-catch: 10 tosses, no racket. Each must land on the same coin-sized spot just inside your front foot. Groove the one thing the nerves steal."},
    insight:"The double fault is rarely the serve — it's the toss losing its nerve. Groove the toss and the serve holds." }
];

/* ════════ ENGINE ════════ */
let step=-1, answered=false, score=0;
const app=()=>document.getElementById('app');
const total=QUESTIONS.length;

function dots(active, revealedUpTo){
  let h='<div class="dots">';
  for(let i=0;i<total;i++){
    const tech=QUESTIONS[i].type==='technique';
    let cls='dot'+(tech?' tech':'');
    if(i<active) cls+=' done'; else if(i===active) cls+=' now';
    h+=`<div class="${cls}"></div>`;
  }
  return h+'</div>';
}

function renderIntro(){
  app().innerHTML=`<div class="fade hero" style="padding-top:30px;">
    <div class="eyebrow">${THEME.eyebrow}</div>
    <h1>${THEME.title}</h1>
    <p>${THEME.intro}</p>
    <button class="cta" onclick="start()">Start today's challenge →</button>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:rgba(255,255,255,.3);">4 questions · ~2 minutes</div>
  </div>`;
}
function start(){ step=0; renderStep(); }

function renderStep(){
  answered=false;
  const q=QUESTIONS[step];
  const scene = q.type==='court' ? courtScene(q,null) : techScene(false);
  const opts = q.options.map((o,i)=>`<button class="opt" id="opt${i}" onclick="answer(${i})"><div class="ol">${String.fromCharCode(65+i)}</div><div class="otx"><div class="otl">${o.label}</div>${o.sub?`<div class="osub">${o.sub}</div>`:''}</div></button>`).join('');
  app().innerHTML=`<div class="fade">${dots(step)}
    <div class="qtag ${q.type==='technique'?'exec':'tactical'}">${q.tag}</div>
    <div class="situation">${q.situation}</div>
    <div class="prompt">${q.prompt}</div>
    <div id="scene">${scene}</div>
    <div class="opts" id="opts">${opts}</div>
    <div id="reveal"></div>
  </div>`;
}

function answer(i){
  if(answered) return; answered=true;
  const q=QUESTIONS[step], o=q.options[i], ci=q.options.findIndex(x=>x.correct);
  if(o.correct) score++;
  // re-render scene with reveal
  document.getElementById('scene').innerHTML = q.type==='court' ? courtScene(q,i) : techScene(true);
  // mark options
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    if(idx===i) el.classList.add(o.correct?'sel':'wrong');
    else if(idx===ci) el.classList.add('sel');
    else el.classList.add('dim');
  });
  const last = step===total-1;
  const tagTxt = o.correct?'Nailed it':'Not quite';
  const tagCol = o.correct?'var(--green)':'var(--wrong)';
  const cueBlock = q.cue?`<div class="rv-cue"><div class="cl">Your cue</div><div class="ct">${q.cue.title}</div><div class="cd">${q.cue.drill}</div></div>`:'';
  document.getElementById('reveal').innerHTML=`<div class="reveal show">
    <div class="rv-tag" style="color:${tagCol}">${o.correct?'✓':'✗'} ${tagTxt}</div>
    <div class="rv-body">${o.verdict}</div>
    ${q.insight?`<div class="rv-insight">${q.insight}</div>`:''}
    ${cueBlock}
    <button class="cta ${last?'gold':''}" style="margin-top:18px;" onclick="next()">${last?'See your court cue →':'Next →'}</button>
  </div>`;
  setTimeout(()=>{document.getElementById('reveal').scrollIntoView({behavior:'smooth',block:'nearest'});},120);
}

function next(){ step++; if(step>=total) renderEnd(); else { renderStep(); window.scrollTo({top:0,behavior:'smooth'}); } }

function renderEnd(){
  window.scrollTo({top:0});
  app().innerHTML=`<div class="fade" style="padding-top:14px;">
    <div class="endcard">
      <div class="score">${score}/${total}</div>
      <div class="scsub">Reads correct today</div>
    </div>
    <div class="cue-big">
      <div class="cbl">Today's court cue</div>
      <div class="cbt">${THEME.endCue}</div>
      <div class="cbb">${THEME.endBody}</div>
    </div>
    <button class="cta" onclick="location.reload()">Come back tomorrow →</button>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:rgba(255,255,255,.3);">🔥 That's your streak alive</div>
  </div>`;
}

renderIntro();
</script>
</body>
</html>
