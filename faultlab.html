<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GameSharp · Fault Lab (stress test)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#070d07;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;}
#app{max-width:560px;margin:0 auto;padding:0 20px 60px;}
.lab-flag{position:fixed;top:0;left:0;right:0;text-align:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#06140a;background:#c8a84b;font-weight:800;padding:4px;z-index:50;}
/* ── copied dtc styles ── */
.dtc-top{display:flex;align-items:center;justify-content:space-between;padding:40px 0 0;}
.dtc-brand{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:#5bba6f;cursor:pointer;}
.dtc-close{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dtc-fade{animation:dtcFade .42s cubic-bezier(.22,1,.36,1);}
@keyframes dtcFade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.dtc-eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#c8a84b;font-weight:800;margin-bottom:12px;}
.dtc-h1{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:1px;line-height:.96;margin:0 0 14px;color:#fff;}
.dtc-intro{font-size:15px;line-height:1.6;color:rgba(255,255,255,.66);margin:0 0 26px;}
.dtc-cta{width:100%;background:#5bba6f;color:#06140a;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.4px;border:none;border-radius:14px;padding:16px;cursor:pointer;box-shadow:0 6px 22px rgba(91,186,111,.28);}
.dtc-cta:active{transform:scale(.98);} .dtc-cta.gold{background:#c8a84b;box-shadow:0 6px 22px rgba(200,168,75,.28);}
.dtc-cta-ghost{width:100%;background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:700;letter-spacing:.4px;border:none;border-radius:12px;padding:12px;cursor:pointer;}
.fix-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;padding-bottom:18px;}
.fix-card{display:flex;flex-direction:column;align-items:flex-start;gap:3px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:15px 14px;cursor:pointer;text-align:left;position:relative;}
.fix-card:active{transform:scale(.97);}
.fix-card-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.5px;color:#fff;line-height:1.05;}
.fix-card-meta{font-size:11px;color:rgba(255,255,255,.42);}
.fix-card-arrow{position:absolute;top:12px;right:13px;color:rgba(91,186,111,.6);font-size:14px;}
.fix-dots{display:flex;gap:6px;justify-content:center;margin:4px 0 14px;}
.fix-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);}
.fix-dot.now{background:#c8a84b;}.fix-dot.done{background:#5bba6f;}
.dtc-qtag{display:inline-block;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:12px;color:#c8a84b;background:rgba(200,168,75,.14);}
.dtc-sit{font-size:14px;line-height:1.55;color:rgba(255,255,255,.6);margin-bottom:6px;}
.dtc-prompt{font-family:'Bebas Neue',sans-serif;font-size:27px;letter-spacing:.6px;line-height:1.05;margin:6px 0 16px;color:#fff;}
.dtc-fig{position:relative;background:radial-gradient(130% 120% at 50% 30%,#16401d,#0e2913 55%,#081710);border-radius:14px;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.5);}
.dtc-fig svg{display:block;width:100%;height:auto;}
.dtc-opts{margin-top:16px;}
.dtc-opt{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:14px 15px;display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;text-align:left;transition:.18s;}
.dtc-opt:active{transform:scale(.99);}
.dtc-opt .dtc-ol{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#5bba6f;flex-shrink:0;}
.dtc-opt .dtc-otx{flex:1;} .dtc-opt .dtc-otl{font-size:14.5px;font-weight:600;color:#fff;}
.dtc-opt.sel{border-color:#5bba6f;background:rgba(91,186,111,.12);box-shadow:0 0 0 1px #5bba6f;}
.dtc-opt.wrong{border-color:#e07070;background:rgba(224,112,112,.1);box-shadow:0 0 0 1px #e07070;}
.dtc-opt.dim{opacity:.34;} .dtc-opt.sel .dtc-ol{background:#5bba6f;color:#06140a;} .dtc-opt.wrong .dtc-ol{background:#e07070;color:#fff;}
.dtc-reveal.show{animation:dtcFade .5s cubic-bezier(.22,1,.36,1) both;}
.dtc-rtag{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;margin-bottom:8px;}
.dtc-rbody{font-size:14.5px;line-height:1.55;color:#fff;}
.dtc-rins{font-size:13px;font-style:italic;color:rgba(255,255,255,.56);line-height:1.5;margin-top:11px;padding-left:12px;border-left:2px solid rgba(200,168,75,.4);}
.dtc-cue{margin-top:14px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.26);border-radius:12px;padding:12px 14px;}
.dtc-cue .dtc-cl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#c8a84b;font-weight:800;margin-bottom:4px;}
.dtc-cue .dtc-ct{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.6px;color:#fff;}
.dtc-cue .dtc-cd{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px;line-height:1.4;}
@keyframes dtcCdot{0%,100%{r:8;opacity:.95;}50%{r:12;opacity:.5;}}
.dtc-cdot{animation:dtcCdot 1.5s ease-in-out infinite;}
/* audit mode */
.aud-cat{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#5bba6f;margin:22px 0 8px;letter-spacing:.5px;}
.aud-card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:13px 15px;margin-bottom:10px;}
.aud-sit{font-size:13px;color:rgba(255,255,255,.55);line-height:1.5;}
.aud-ans{font-size:14px;color:#5bba6f;font-weight:700;margin:7px 0 4px;}
.aud-ver{font-size:13px;color:rgba(255,255,255,.8);line-height:1.5;}
.aud-cue{font-size:12.5px;color:#c8a84b;margin-top:7px;}
.aud-ins{font-size:12.5px;font-style:italic;color:rgba(255,255,255,.5);margin-top:5px;}
/* keep/rework marking */
.rate-row{display:flex;align-items:center;gap:9px;margin-top:13px;}
.rate-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:800;}
.rate-btn{min-width:42px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.rate-btn:active{transform:scale(.95);}
.rate-btn.up.on{border-color:#5bba6f;background:rgba(91,186,111,.18);}
.rate-btn.down.on{border-color:#e07070;background:rgba(224,112,112,.16);}
</style>
</head>
<body>
<div class="lab-flag">⚠ Fault Lab — stress-test sandbox · not wired to the live app</div>
<div id="app"></div>

<script>
/* ════════ FIGURE ENGINE (copied verbatim from index.html DTC) ════════ */
function dtcLimb(a,b,w){return `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="#e9f0e1" stroke-width="${w||11}" stroke-linecap="round"/>`;}
function dtcArrow(x1,y1,x2,y2,col,w){const a=Math.atan2(y2-y1,x2-x1),L=9;
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w||4}" stroke-linecap="round"/><path d="M${x2},${y2} L${x2-L*Math.cos(a-0.5)},${y2-L*Math.sin(a-0.5)} M${x2},${y2} L${x2-L*Math.cos(a+0.5)},${y2-L*Math.sin(a+0.5)}" stroke="${col}" stroke-width="${w||4}" fill="none" stroke-linecap="round"/>`;}
const DTC_FLOOR=`<line x1="34" y1="302" x2="266" y2="302" stroke="rgba(255,255,255,.18)" stroke-width="2"/><ellipse cx="150" cy="306" rx="116" ry="9" fill="rgba(0,0,0,.25)"/>`;
const DTC_HIPLINE=`<line x1="150" y1="20" x2="150" y2="300" stroke="rgba(255,255,255,.13)" stroke-width="1" stroke-dasharray="3,4"/><text x="150" y="16" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.3)" font-family="DM Sans">your hip</text>`;
function dtcFhFig(cx){const sh=[150,102],hip=[150,170],wr=[cx-26,118],elb=[(sh[0]+wr[0])/2+6,116],rkt=[cx,108],oElb=[122,124],oWr=[100,148],bKnee=[134,236],bAnk=[120,300],fKnee=[180,238],fAnk=[196,300],head=[150,70];
  return `<g opacity="0.96">${dtcLimb(hip,bKnee)}${dtcLimb(bKnee,bAnk)}${dtcLimb(hip,fKnee)}${dtcLimb(fKnee,fAnk)}${dtcLimb(sh,hip,12)}${dtcLimb(sh,oElb)}${dtcLimb(oElb,oWr)}${dtcLimb(sh,elb)}${dtcLimb(elb,wr)}<line x1="${wr[0]}" y1="${wr[1]}" x2="${rkt[0]}" y2="${rkt[1]}" stroke="#c8a84b" stroke-width="5" stroke-linecap="round"/><circle cx="${rkt[0]}" cy="${rkt[1]}" r="13" fill="none" stroke="#c8a84b" stroke-width="3"/><line x1="${sh[0]}" y1="${sh[1]}" x2="${head[0]}" y2="${head[1]+12}" stroke="#e9f0e1" stroke-width="10" stroke-linecap="round"/><circle cx="${head[0]}" cy="${head[1]}" r="15" fill="#e9f0e1"/></g>`;}
function dtcServeFig(reach){const head=reach?[150,84]:[150,92],sh=reach?[150,110]:[150,116],hip=[150,176],elb=reach?[160,80]:[172,100],wr=reach?[164,52]:[192,104],rkt=reach?[170,24]:[212,92],oElb=reach?[140,98]:[136,108],oWr=reach?[126,62]:[120,96],bKnee=reach?[150,242]:[146,236],bAnk=reach?[150,300]:[138,300],fKnee=reach?[160,242]:[166,238],fAnk=reach?[168,300]:[182,300];
  return `<g opacity="0.96">${dtcLimb(hip,bKnee)}${dtcLimb(bKnee,bAnk)}${dtcLimb(hip,fKnee)}${dtcLimb(fKnee,fAnk)}${dtcLimb(sh,hip,12)}${dtcLimb(sh,oElb)}${dtcLimb(oElb,oWr)}${dtcLimb(sh,elb)}${dtcLimb(elb,wr)}<line x1="${wr[0]}" y1="${wr[1]}" x2="${rkt[0]}" y2="${rkt[1]}" stroke="#c8a84b" stroke-width="5" stroke-linecap="round"/><circle cx="${rkt[0]}" cy="${rkt[1]}" r="13" fill="none" stroke="#c8a84b" stroke-width="3"/><line x1="${sh[0]}" y1="${sh[1]}" x2="${head[0]}" y2="${head[1]+12}" stroke="#e9f0e1" stroke-width="10" stroke-linecap="round"/><circle cx="${head[0]}" cy="${head[1]}" r="15" fill="#e9f0e1"/></g>`;}

/* Ground-stroke contact scene (out: long | net | weak) */
function dtcContactScene(rev,c){
  const M={long:{p:"M148,106 Q208,84 278,70",lx:244,ly:62},net:{p:"M148,106 Q198,150 232,250",lx:248,ly:226},weak:{p:"M148,106 Q188,120 200,200",lx:214,ly:212}}[c.out||'long'];
  if(!rev)return `<div class="dtc-fig"><svg viewBox="0 0 300 330">${DTC_FLOOR}${DTC_HIPLINE}${dtcFhFig(150)}<circle class="dtc-cdot" cx="148" cy="106" r="8" fill="rgba(224,112,112,.95)"/><path d="${M.p}" stroke="rgba(224,112,112,.7)" stroke-width="2.4" fill="none" stroke-dasharray="5,4"/><text x="${M.lx}" y="${M.ly}" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${c.sym}</text></svg></div>`;
  return `<div class="dtc-fig"><svg viewBox="0 0 300 330">${DTC_FLOOR}${DTC_HIPLINE}${dtcFhFig(214)}<circle cx="148" cy="106" r="8" fill="none" stroke="rgba(224,112,112,.85)" stroke-width="2"/><text x="116" y="92" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${c.fault}</text><circle cx="214" cy="106" r="8" fill="rgba(91,186,111,.95)"/><text x="214" y="88" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(91,186,111,.95)" font-family="DM Sans">${c.fix}</text><path d="M214,106 Q236,150 226,236" stroke="rgba(91,186,111,.7)" stroke-width="2.2" fill="none" stroke-dasharray="5,4"/><text x="248" y="210" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(91,186,111,.9)" font-family="DM Sans">in</text></svg></div>`;
}
/* Serve scene (badOut: net | long | weak | scatter) */
function dtcServeScene(rev,c){
  const B={net:{p:"M214,92 Q244,150 250,250",lx:262,ly:240,t:"into the net"},long:{p:"M214,92 Q250,120 280,40",lx:262,ly:120,t:"sails long"},weak:{p:"M214,92 Q236,140 240,210",lx:256,ly:198,t:"no sting"},scatter:{p:"",lx:0,ly:0,t:""}}[c.badOut||'net'];
  if(!rev){
    const extra = (c.badOut==='scatter') ? `<circle cx="186" cy="60" r="6" fill="rgba(224,112,112,.6)"/><circle cx="234" cy="44" r="6" fill="rgba(224,112,112,.6)"/><circle cx="210" cy="86" r="6" fill="rgba(224,112,112,.6)"/>` : `<path d="${B.p}" stroke="rgba(224,112,112,.7)" stroke-width="2.4" fill="none" stroke-dasharray="5,4"/><text x="${B.lx}" y="${B.ly}" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${B.t}</text>`;
    return `<div class="dtc-fig"><svg viewBox="0 0 300 330">${DTC_FLOOR}${dtcServeFig(false)}<circle class="dtc-cdot" cx="214" cy="78" r="8" fill="rgba(224,112,112,.95)"/><text x="214" y="62" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${c.sym}</text>${extra}</svg></div>`;
  }
  return `<div class="dtc-fig"><svg viewBox="0 0 300 330">${DTC_FLOOR}${dtcServeFig(true)}<circle cx="214" cy="78" r="7" fill="none" stroke="rgba(224,112,112,.85)" stroke-width="2"/><text x="246" y="82" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${c.fault}</text><circle cx="178" cy="24" r="8" fill="rgba(91,186,111,.95)"/><text x="178" y="14" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(91,186,111,.95)" font-family="DM Sans">${c.fix}</text><path d="M174,28 Q150,120 196,250" stroke="rgba(91,186,111,.7)" stroke-width="2.2" fill="none" stroke-dasharray="5,4"/><text x="214" y="232" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(91,186,111,.9)" font-family="DM Sans">in</text></svg></div>`;
}

/* ════════ NEW FIGURES for the lab ════════ */
/* Low-ball posture: bent=true => knees bent, hips low (good); false => legs straight, bent at waist (fault). Contact low & out front. */
function labLowFig(bent){
  const head=[150, bent?122:92], sh=[150, bent?150:120], hip=[150, bent?196:178];
  const bKnee=[126, bent?232:252], bAnk=[116,300], fKnee=[178, bent?232:252], fAnk=[188,300];
  const wr=[182,212], rkt=[208,216], elb=[168,184], oElb=[128,168], oWr=[110,200];
  return `<g opacity="0.96">${dtcLimb(hip,bKnee)}${dtcLimb(bKnee,bAnk)}${dtcLimb(hip,fKnee)}${dtcLimb(fKnee,fAnk)}${dtcLimb(sh,hip,12)}${dtcLimb(sh,oElb)}${dtcLimb(oElb,oWr)}${dtcLimb(sh,elb)}${dtcLimb(elb,wr)}<line x1="${wr[0]}" y1="${wr[1]}" x2="${rkt[0]}" y2="${rkt[1]}" stroke="#c8a84b" stroke-width="5" stroke-linecap="round"/><circle cx="${rkt[0]}" cy="${rkt[1]}" r="12" fill="none" stroke="#c8a84b" stroke-width="3"/><line x1="${sh[0]}" y1="${sh[1]}" x2="${head[0]}" y2="${head[1]+12}" stroke="#e9f0e1" stroke-width="10" stroke-linecap="round"/><circle cx="${head[0]}" cy="${head[1]}" r="15" fill="#e9f0e1"/></g>`;
}
function labLowScene(rev,c){
  const O={net:{p:"M208,216 Q230,256 238,294",lx:256,ly:282,t:"into the net"},pop:{p:"M208,216 Q214,150 244,118",lx:262,ly:128,t:"pops up"},weak:{p:"M208,216 Q236,214 262,224",lx:268,ly:236,t:"no depth"}}[c.out||'net'];
  if(!rev)return `<div class="dtc-fig"><svg viewBox="0 0 300 330">${DTC_FLOOR}${labLowFig(false)}<text x="150" y="118" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(224,112,112,.85)" font-family="DM Sans">standing tall</text><circle class="dtc-cdot" cx="208" cy="216" r="8" fill="rgba(224,112,112,.95)"/><path d="${O.p}" stroke="rgba(224,112,112,.7)" stroke-width="2.4" fill="none" stroke-dasharray="5,4"/><text x="${O.lx}" y="${O.ly}" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${c.sym}</text></svg></div>`;
  return `<div class="dtc-fig"><svg viewBox="0 0 300 330">${DTC_FLOOR}${labLowFig(true)}<text x="150" y="148" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(91,186,111,.95)" font-family="DM Sans">knees bent</text><circle cx="208" cy="216" r="8" fill="rgba(91,186,111,.95)"/><path d="M208,216 Q224,180 244,150" stroke="rgba(91,186,111,.7)" stroke-width="2.2" fill="none" stroke-dasharray="5,4"/><text x="262" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(91,186,111,.9)" font-family="DM Sans">lifts &amp; lands</text></svg></div>`;
}
/* Spacing: reuse dtcFhFig with contact x. jam => contact crowded (small cx); reach => stretched (large cx); fix => out in front (cx 200). */
function labFoot(x,col){return `<ellipse cx="${x}" cy="299" rx="8" ry="4.5" fill="${col}"/>`;}
function labSpaceScene(rev,c){
  const cx = rev ? 200 : (c.mode==='jam' ? 122 : 256);
  const fig = dtcFhFig(cx);
  if(!rev){
    const jam = c.mode==='jam';
    const lbl = jam ? 'jammed — too close' : 'reaching — too far';
    const lblX = jam ? 96 : 250;
    const traj = jam ? "M122,108 Q150,150 150,250" : "M256,108 Q260,150 250,236";
    const tl = jam ? {x:150,y:232,t:'frame / weak'} : {x:262,y:222,t:'weak floater'};
    // CAUSE marker: the absence of adjustment steps (feet stayed planted)
    return `<div class="dtc-fig"><svg viewBox="0 0 300 330">${DTC_FLOOR}${fig}<circle class="dtc-cdot" cx="${cx}" cy="108" r="8" fill="rgba(224,112,112,.95)"/><text x="${lblX}" y="94" text-anchor="middle" font-size="8.5" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${lbl}</text><path d="${traj}" stroke="rgba(224,112,112,.7)" stroke-width="2.4" fill="none" stroke-dasharray="5,4"/><text x="${tl.x}" y="${tl.y}" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(224,112,112,.9)" font-family="DM Sans">${tl.t}</text><text x="150" y="323" text-anchor="middle" font-size="9" font-weight="800" fill="rgba(224,112,112,.85)" font-family="DM Sans">✗ feet planted — no adjustment steps</text></svg></div>`;
  }
  // FIX: the cause made visible — small adjustment steps into the ball
  const steps = `${labFoot(82,'rgba(91,186,111,.4)')}${labFoot(110,'rgba(91,186,111,.62)')}${labFoot(138,'rgba(91,186,111,.92)')}${dtcArrow(72,287,150,287,'rgba(91,186,111,.55)',1.8)}`;

    render:r=>labSpaceScene(r,{mode:'reach'}),
    options:[
      {label:"You ran too fast",correct:false,verdict:"Speed's good — the issue is you never planted. You hit mid-stride instead of off a set foot."},
      {label:"You hit while still moving — no outside foot to plant and push off",correct:true,verdict:"This is the usual one. Hitting in full stride means no base, no balance, and no recovery — the ball sprays and you're stranded. Plant the OUTSIDE foot to stop your momentum, hit off that stable base, and push back off it to recover. Set, hit, recover — not hit-on-the-run."},
      {label:"Wrong grip for running shots",correct:false,verdict:"Grip isn't the leak — the missing plant step is."},
      {label:"You took too big a backswing on the run",correct:false,verdict:"A big swing on the run does hurt, but the spray comes from having no planted base — set the outside foot and a compact swing lands clean."}],
    cue:{title:"Plant the outside foot — set, hit, push back to recover",drill:"Wide feeds: stop hard on the outside leg, hit, and explode back to centre. No hitting mid-stride."},
    insight:"The outside foot is your brake AND your launch pad. Plant it, hit, and it sends you back into the point."},
  { sit:"On a deep heavy ball you backed straight up — and ended up cramped, hitting off your back foot.",
    render:r=>labSpaceScene(r,{mode:'jam'}),
    options:[
      {label:"The ball was just too good",correct:false,verdict:"Deep balls are handleable — backing straight up is what cramped you, not the ball's quality."},
      {label:"You back-pedalled instead of moving up or taking small steps to adjust",correct:true,verdict:"Nine times in ten, this. Drifting straight back lets the ball chase you and jams you on your heels with no base. Either step IN and take it earlier on the rise, or move back with quick crossover steps and set up — but don't back-pedal flat-footed. Meet the deep ball with a plan, not a retreat."},
      {label:"You should have hit it harder",correct:false,verdict:"Power off the back foot just sprays — the leak is the backward drift, not effort."},
      {label:"Wrong grip",correct:false,verdict:"Grip isn't it — the footwork retreat cramped you."}],
    cue:{title:"Step in or set up — don't back-pedal off your heels",drill:"Deep feeds: either take it early stepping in, or recover back with crossover steps and a planted base."},
    insight:"Backing straight up hands the ball the initiative. Step in and rob their time, or reset with real steps."}
]}
];

/* ════════ PLAYER ════════ */
const app = () => document.getElementById('app');
let catIdx=-1, fIdx=0, answered=false;

/* ── keep/rework marks (localStorage) ── */
let labRatings={}; try{ labRatings=JSON.parse(localStorage.getItem('faultlab_ratings')||'{}'); }catch(e){}
function rateId(k,i){ return k+'-'+i; }
function rate(id,val){
  if(labRatings[id]===val) delete labRatings[id]; else labRatings[id]=val;
  try{ localStorage.setItem('faultlab_ratings',JSON.stringify(labRatings)); }catch(e){}
  document.querySelectorAll('[data-rate="'+id+'"]').forEach(el=>{ const v=labRatings[id];
    el.querySelector('.up').classList.toggle('on',v==='up');
    el.querySelector('.down').classList.toggle('on',v==='down'); });
}
function rateRow(id){ const v=labRatings[id]||'';
  return `<div class="rate-row" data-rate="${id}"><div class="rate-lbl">Keep?</div><button class="rate-btn up${v==='up'?' on':''}" onclick="rate('${id}','up')">👍</button><button class="rate-btn down${v==='down'?' on':''}" onclick="rate('${id}','down')">👎</button></div>`;
}
function exportRatings(){
  const ups=[],downs=[];
  LAB_CATS.forEach(c=>c.faults.forEach((q,i)=>{ const v=labRatings[rateId(c.key,i)]; const t=c.label+' #'+(i+1); if(v==='up')ups.push(t); else if(v==='down')downs.push(t); }));
  const txt=`FAULT LAB MARKS\n\n✓ KEEP (${ups.length}):\n${ups.join('\n')||'—'}\n\n✗ REWORK (${downs.length}):\n${downs.join('\n')||'—'}`;
  try{ navigator.clipboard.writeText(txt); }catch(e){}
  alert(txt+'\n\n(copied to clipboard)');
}

function topBar(label,onClick){
  return `<div class="dtc-top"><div class="dtc-brand" onclick="${onClick}">‹ ${label}</div><div class="dtc-close" onclick="renderHome()">✕</div></div>`;
}
function renderHome(){
  catIdx=-1;
  const cards = LAB_CATS.map((c,i)=>`<button class="fix-card" onclick="openCat(${i})"><div class="fix-card-arrow">→</div><div class="fix-card-name">${c.label}</div><div class="fix-card-meta">${c.faults.length} faults</div></button>`).join('');
  app().innerHTML = `<div class="dtc-top"><div class="dtc-brand" style="cursor:default;">FAULT LAB</div><div></div></div>
    <div class="dtc-fade" style="padding-top:14px;">
      <div class="dtc-eyebrow">New Fault Mirror · stress test</div>
      <h1 class="dtc-h1">Find the culprit</h1>
      <p class="dtc-intro">5 new candidate categories · 20 scenarios. Play them, or audit all the content + cues at once.</p>
      <div class="fix-grid">${cards}</div>
      <button class="dtc-cta gold" onclick="renderAudit()" style="margin-top:6px;">Audit all content →</button>
      <button class="dtc-cta-ghost" onclick="exportRatings()" style="margin-top:10px;">Export my keep / rework marks →</button>
    </div>`;
  window.scrollTo(0,0);
}
function openCat(i){ catIdx=i; fIdx=0; renderFault(); }
function renderFault(){
  answered=false;
  const c=LAB_CATS[catIdx], q=c.faults[fIdx];
  const opts=q.options.map((o,k)=>`<button class="dtc-opt" id="opt${k}" onclick="answer(${k})"><div class="dtc-ol">${String.fromCharCode(65+k)}</div><div class="dtc-otx"><div class="dtc-otl">${o.label}</div></div></button>`).join('');
  let dots=''; for(let d=0;d<c.faults.length;d++) dots+=`<div class="fix-dot${d<fIdx?' done':(d===fIdx?' now':'')}"></div>`;
  app().innerHTML = `${topBar('Categories','renderHome()')}<div class="dtc-fade">
    <div class="fix-dots">${dots}</div>
    <div class="dtc-qtag">${c.label} · fault ${fIdx+1} of ${c.faults.length}</div>
    <div class="dtc-sit">${q.sit}</div>
    <div class="dtc-prompt">${PROMPT}</div>
    <div id="scene">${q.render(false)}</div>
    <div class="dtc-opts">${opts}</div>
    <div id="reveal"></div></div>`;
  window.scrollTo(0,0);
}
function answer(k){
  if(answered) return; answered=true;
  const c=LAB_CATS[catIdx], q=c.faults[fIdx], o=q.options[k], ci=q.options.findIndex(x=>x.correct);
  document.getElementById('scene').innerHTML=q.render(true);
  document.querySelectorAll('.dtc-opt').forEach((el,idx)=>{ if(idx===k) el.classList.add(o.correct?'sel':'wrong'); else if(idx===ci) el.classList.add('sel'); else el.classList.add('dim'); el.onclick=null; });
  const cue=q.cue?`<div class="dtc-cue"><div class="dtc-cl">Your cue</div><div class="dtc-ct">${q.cue.title}</div><div class="dtc-cd">${q.cue.drill}</div></div>`:'';
  const last=fIdx>=c.faults.length-1;
  document.getElementById('reveal').innerHTML=`<div class="dtc-reveal show">
    <div class="dtc-rtag" style="color:${o.correct?'#5bba6f':'#e07070'}">${o.correct?'✓ Nailed it':'✗ Not quite'}</div>
    <div class="dtc-rbody">${o.verdict}</div>${q.insight?`<div class="dtc-rins">${q.insight}</div>`:''}${cue}
    ${rateRow(rateId(c.key,fIdx))}
    <button class="dtc-cta gold" style="margin-top:14px;" onclick="${last?'renderHome()':'nextFault()'}">${last?'Back to categories →':'Next fault →'}</button></div>`;
  setTimeout(()=>{const r=document.getElementById('reveal'); if(r) r.scrollIntoView({behavior:'smooth',block:'nearest'});},120);
}
function nextFault(){ fIdx++; if(fIdx>=LAB_CATS[catIdx].faults.length) renderHome(); else renderFault(); }

function renderAudit(){
  let h=`<div class="dtc-top"><div class="dtc-brand" onclick="renderHome()">‹ Lab</div><div class="dtc-close" onclick="renderHome()">✕</div></div>
    <div class="dtc-fade"><div class="dtc-eyebrow">Content audit</div><h1 class="dtc-h1" style="font-size:34px;">All 20 scenarios</h1>
    <p class="dtc-intro" style="margin-bottom:8px;">Mark each 👍 keep or 👎 rework. <span style="color:#c8a84b;cursor:pointer;text-decoration:underline;" onclick="exportRatings()">Export marks</span></p>`;
  LAB_CATS.forEach(c=>{
    h+=`<div class="aud-cat">${c.label}</div>`;
    c.faults.forEach((q,i)=>{
      const correct=q.options.find(o=>o.correct)||{};
      h+=`<div class="aud-card"><div class="aud-sit">${i+1}. ${q.sit}</div>
        <div class="aud-ans">✓ ${correct.label}</div>
        <div class="aud-ver">${correct.verdict}</div>
        <div class="aud-cue">🎾 Cue: ${q.cue.title}</div>
        <div class="aud-ins">${q.insight}</div>
        ${rateRow(rateId(c.key,i))}</div>`;
    });
  });
  h+=`</div>`;
  app().innerHTML=h; window.scrollTo(0,0);
}
renderHome();
</script>
</body>
</html>
