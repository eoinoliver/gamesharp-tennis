<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GAMESHARP · Fault Mirror — MOTION proof</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--fig:#e9f0e1;--gold:#c8a84b;--green:#5bba6f;--red:#e07070;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#070d07;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;}
#app{max-width:560px;margin:0 auto;padding:0 20px 60px;}
.lab-flag{position:fixed;top:0;left:0;right:0;text-align:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#06140a;background:#c8a84b;font-weight:800;padding:4px;z-index:50;}
.top{display:flex;align-items:center;justify-content:space-between;padding:40px 0 0;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--green);}
.fade{animation:fade .42s cubic-bezier(.22,1,.36,1);}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:800;margin:14px 0 10px;}
.sit{font-size:14px;line-height:1.55;color:rgba(255,255,255,.62);margin-bottom:6px;}
.prompt{font-family:'Bebas Neue',sans-serif;font-size:27px;letter-spacing:.6px;line-height:1.05;margin:6px 0 14px;color:#fff;}
.stage{position:relative;background:radial-gradient(130% 120% at 50% 26%,#16401d,#0e2913 55%,#081710);border-radius:14px;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.5);}
.stage svg{display:block;width:100%;height:auto;}
.stage-tag{position:absolute;top:10px;left:12px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;color:rgba(255,255,255,.5);background:rgba(0,0,0,.35);padding:3px 9px;border-radius:6px;}
.play-row{display:flex;gap:10px;margin-top:10px;}
.play-btn{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#fff;font-weight:700;font-size:13px;border-radius:11px;padding:11px;cursor:pointer;}
.play-btn:active{transform:scale(.98);}
.play-btn.go{background:var(--gold);color:#06140a;border-color:var(--gold);}
.opts{margin-top:16px;}
.opt{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:14px 15px;display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;text-align:left;transition:.18s;}
.opt:active{transform:scale(.99);}
.opt .ol{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--green);flex-shrink:0;}
.opt .otl{font-size:14.5px;font-weight:600;color:#fff;}
.opt.sel{border-color:var(--green);background:rgba(91,186,111,.12);box-shadow:0 0 0 1px var(--green);}
.opt.wrong{border-color:var(--red);background:rgba(224,112,112,.1);box-shadow:0 0 0 1px var(--red);}
.opt.dim{opacity:.34;}.opt.sel .ol{background:var(--green);color:#06140a;}.opt.wrong .ol{background:var(--red);color:#fff;}
.reveal.show{animation:fade .5s cubic-bezier(.22,1,.36,1) both;}
.rtag{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;margin-bottom:8px;}
.rbody{font-size:14.5px;line-height:1.55;color:#fff;}
.rins{font-size:13px;font-style:italic;color:rgba(255,255,255,.56);line-height:1.5;margin-top:11px;padding-left:12px;border-left:2px solid rgba(200,168,75,.4);}
.cue{margin-top:14px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.26);border-radius:12px;padding:12px 14px;}
.cue .cl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:4px;}
.cue .ct{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.6px;color:#fff;}
.cue .cd{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px;line-height:1.4;}
@keyframes cdot{0%,100%{r:9;opacity:.95;}50%{r:13;opacity:.55;}}
.cdot{animation:cdot 1.2s ease-in-out infinite;}
.note{font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-top:20px;line-height:1.5;}
</style>
</head>
<body>
<div class="lab-flag">⚠ Fault Mirror — MOTION proof · is this the direction?</div>
<div id="app"></div>
<script>
/* ════════ ENGINE (ported from technique.html) ════════ */
const VIEW={w:300,h:340,ground:302};
function limb(a,b,w){return `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="var(--fig)" stroke-width="${w||11}" stroke-linecap="round"/>`;}
function arrow(x1,y1,x2,y2,col,w){const ang=Math.atan2(y2-y1,x2-x1),L=9;
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w||4}" stroke-linecap="round"/><path d="M${x2},${y2} L${x2-L*Math.cos(ang-0.5)},${y2-L*Math.sin(ang-0.5)} M${x2},${y2} L${x2-L*Math.cos(ang+0.5)},${y2-L*Math.sin(ang+0.5)}" stroke="${col}" stroke-width="${w||4}" stroke-linecap="round" fill="none"/>`;}
function figure(p){return `<g opacity="0.96">${limb(p.hip,p.bKnee)}${limb(p.bKnee,p.bAnk)}${limb(p.hip,p.fKnee)}${limb(p.fKnee,p.fAnk)}${limb(p.sh,p.hip,12)}${limb(p.sh,p.oElb)}${limb(p.oElb,p.oWr)}${limb(p.sh,p.elb)}${limb(p.elb,p.wr)}<line x1="${p.wr[0]}" y1="${p.wr[1]}" x2="${p.rkt[0]}" y2="${p.rkt[1]}" stroke="var(--gold)" stroke-width="5" stroke-linecap="round"/><circle cx="${p.rkt[0]}" cy="${p.rkt[1]}" r="13" fill="none" stroke="var(--gold)" stroke-width="3"/><line x1="${p.sh[0]}" y1="${p.sh[1]}" x2="${p.head[0]}" y2="${p.head[1]+12}" stroke="var(--fig)" stroke-width="10" stroke-linecap="round"/><circle cx="${p.head[0]}" cy="${p.head[1]}" r="15" fill="var(--fig)"/></g>`;}
function floor(){return `<line x1="34" y1="${VIEW.ground+2}" x2="266" y2="${VIEW.ground+2}" stroke="rgba(255,255,255,.18)" stroke-width="2"/><ellipse cx="150" cy="${VIEW.ground+6}" rx="118" ry="10" fill="rgba(0,0,0,.25)"/>`;}
function lerp(a,b,t){return a+(b-a)*t;}
function lerpPose(A,B,t){const o={};for(const k in A)o[k]=[lerp(A[k][0],B[k][0],t),lerp(A[k][1],B[k][1],t)];return o;}
function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

/* ════════ FOREHAND POSES (correct, from technique.html) + a faulty 'late contact' ════════ */
const P={
  load:{head:[150,70],sh:[150,102],hip:[152,172],elb:[124,130],wr:[108,156],rkt:[84,186],oElb:[180,120],oWr:[210,130],bKnee:[130,236],bAnk:[124,302],fKnee:[178,240],fAnk:[194,302]},
  drop:{head:[150,70],sh:[150,102],hip:[150,170],elb:[150,126],wr:[172,150],rkt:[160,188],oElb:[136,116],oWr:[116,134],bKnee:[132,237],bAnk:[122,301],fKnee:[178,239],fAnk:[193,301]},
  contact:{head:[152,70],sh:[152,102],hip:[150,170],elb:[184,124],wr:[214,128],rkt:[242,108],oElb:[124,124],oWr:[100,146],bKnee:[134,238],bAnk:[118,302],fKnee:[178,240],fAnk:[190,302]},
  finish:{head:[150,70],sh:[150,100],hip:[150,168],elb:[138,96],wr:[114,78],rkt:[94,56],oElb:[126,108],oWr:[102,72],bKnee:[150,242],bAnk:[150,302],fKnee:[172,238],fAnk:[184,302]},
  // FAULT: contact made LATE, behind the hip — racket face open, body upright/leaning back
  lateC:{head:[146,74],sh:[146,104],hip:[152,170],elb:[150,120],wr:[168,108],rkt:[186,86],oElb:[128,122],oWr:[108,138],bKnee:[146,238],bAnk:[138,302],fKnee:[176,240],fAnk:[192,302]},
  // a short, blocked 'finish' for the faulty swing (decel / no follow-through)
  lateEnd:{head:[146,74],sh:[146,104],hip:[152,170],elb:[150,108],wr:[170,92],rkt:[190,72],oElb:[128,120],oWr:[110,134],bKnee:[148,239],bAnk:[140,302],fKnee:[174,240],fAnk:[190,302]}
};

/* ════════ MOTION PLAYER ════════ */
let playing=false;
function playMotion(hostId, seq, ball, label, cb){
  const host=document.getElementById(hostId); if(!host) return;
  playing=true;
  const segs=seq.length-1, dur=320*segs+120, t0=performance.now();
  function frame(now){
    let u=(now-t0)/dur; if(u>1)u=1;
    const fpos=u*segs, seg=Math.min(segs-1,Math.floor(fpos)), local=easeInOut(fpos-seg);
    const p=lerpPose(seq[seg],seq[seg+1],local);
    host.innerHTML=`<div class="stage-tag">${label}</div><svg viewBox="0 0 ${VIEW.w} ${VIEW.h}">${floor()}${figure(p)}</svg>`;
    if(u<1) requestAnimationFrame(frame); else flyBall(host, seq[seq.length-1], ball, label, cb);
  }
  requestAnimationFrame(frame);
}
function flyBall(host, endPose, ball, label, cb){
  const traj = `<path d="${ball.path}" stroke="${ball.col}" stroke-width="2.4" fill="none" stroke-dasharray="5,4" opacity=".75"/>`;
  const note = ball.note ? `<text x="${ball.nx}" y="${ball.ny}" text-anchor="middle" font-size="9" font-weight="800" fill="${ball.col}" font-family="DM Sans">${ball.note}</text>` : '';
  host.innerHTML=`<div class="stage-tag">${label}</div><svg viewBox="0 0 ${VIEW.w} ${VIEW.h}">${floor()}${figure(endPose)}${traj}${note}<circle r="6" fill="#eaff96" stroke="rgba(0,0,0,.3)" stroke-width="1"><animateMotion dur="0.85s" fill="freeze" path="${ball.path}"/></circle></svg>`;
  setTimeout(()=>{ playing=false; if(cb) cb(); }, 900);
}

/* ════════ THE FAULT (forehand · flies long) ════════ */
const FAULT={
  stroke:'Forehand',
  sit:"Three smart reads — but on the big points your forehand kept flying long. Same shot, same miss.",
  faultSeq:[P.load,P.drop,P.lateC,P.lateEnd],
  faultBall:{path:"M188,80 Q236,58 296,72", col:"var(--red)", note:"flies long", nx:250, ny:52},
  fixSeq:[P.load,P.drop,P.contact,P.finish],
  fixBall:{path:"M244,108 Q272,150 250,248", col:"var(--green)", note:"lands in", nx:272, ny:210},
  options:[
    {label:"You swing too hard",correct:false,verdict:"Pace isn't it — players hit just as hard on the forehands they make. It's not how hard, it's when."},
    {label:"You make contact late, behind your hip",correct:true,verdict:"Most likely the culprit. Watch the swing: under pressure your feet slow and you meet the ball late — behind your hip, face open — so it flies long. Your read was right; your contact point betrayed it. Meet it out in front and the same swing lands in."},
    {label:"Too much topspin",correct:false,verdict:"Topspin brings the ball down, if anything. A long ball under pressure is almost never a spin problem."},
    {label:"You don't bend your knees",correct:false,verdict:"Knees matter, but they're not why a good forehand suddenly flies on the big point. The late timing is."}],
  cue:{title:"Meet it earlier — out in front of your hip",drill:"Shadow-catch: feed yourself easy balls and only swing if you can strike level with your front hip. Re-train the timing the nerves stole."},
  insight:"Under pressure, technique doesn't get worse — it gets late. The fix isn't a new forehand. It's an earlier one."
};

/* ════════ FLOW ════════ */
let answered=false;
function render(){
  answered=false;
  const f=FAULT;
  const opts=f.options.map((o,i)=>`<button class="opt" id="opt${i}" onclick="answer(${i})"><div class="ol">${String.fromCharCode(65+i)}</div><div class="otl">${o.label}</div></button>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="top"><div class="brand">FAULT MIRROR · MOTION</div><div></div></div>
    <div class="fade">
      <div class="eyebrow">${f.stroke} · find the culprit</div>
      <div class="sit">${f.sit}</div>
      <div class="prompt">What's the usual culprit?</div>
      <div class="stage" id="stage"></div>
      <div class="play-row"><button class="play-btn" id="replayMiss" onclick="playMiss()">▶ Replay the miss</button></div>
      <div class="opts">${opts}</div>
      <div id="reveal"></div>
    </div>`;
  playMiss();
}
function playMiss(){ if(playing) return; playMotion('stage', FAULT.faultSeq, FAULT.faultBall, 'The miss'); }
function playFix(){ if(playing) return; playMotion('stage', FAULT.fixSeq, FAULT.fixBall, 'The fix'); }
function answer(i){
  if(answered||playing) return; answered=true;
  const f=FAULT, o=f.options[i], ci=f.options.findIndex(x=>x.correct);
  document.querySelectorAll('.opt').forEach((el,idx)=>{ if(idx===i) el.classList.add(o.correct?'sel':'wrong'); else if(idx===ci) el.classList.add('sel'); else el.classList.add('dim'); el.onclick=null; });
  document.getElementById('replayMiss').style.display='none';
  document.getElementById('reveal').innerHTML=`<div class="reveal show">
    <div class="rtag" style="color:${o.correct?'var(--green)':'var(--red)'}">${o.correct?'✓ Nailed it':'✗ Not quite'}</div>
    <div class="rbody">${o.verdict}</div><div class="rins">${f.insight}</div>
    <div class="play-row"><button class="play-btn go" onclick="playFix()">▶ Play the fix</button></div>
    <div class="cue"><div class="cl">Your cue</div><div class="ct">${f.cue.title}</div><div class="cd">${f.cue.drill}</div></div></div>`;
  setTimeout(playFix, 350);
}
render();
</script>
</body>
</html>
