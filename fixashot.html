<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GameSharp · Fix a Shot (prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#0d1a0f;--panel:#101f12;--green:#5bba6f;--gold:#c8a84b;--wrong:#e07070;--line:rgba(255,255,255,.1);--eo:cubic-bezier(0.22,1,0.36,1);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--dark);color:#fff;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:560px;margin:0 auto;padding:0 20px 60px;}
.top{display:flex;align-items:center;gap:12px;padding:46px 0 0;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--green);flex:1;}
.poc{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.28);font-weight:700;}
.back{background:rgba(255,255,255,.06);border:1px solid var(--line);color:rgba(255,255,255,.7);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fade{animation:fade .4s var(--eo);}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--green);font-weight:800;margin:26px 0 8px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:1px;line-height:.96;margin:0 0 10px;}
.sub{font-size:14.5px;line-height:1.55;color:rgba(255,255,255,.6);margin:0 0 22px;}
.card{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:15px 16px;display:flex;align-items:center;gap:14px;margin-bottom:11px;cursor:pointer;text-align:left;transition:.16s;}
.card:hover{border-color:rgba(91,186,111,.5);background:rgba(91,186,111,.06);}
.card:active{transform:scale(.99);}
.card .ic{font-size:24px;width:34px;text-align:center;flex-shrink:0;}
.card .tx{flex:1;}
.card .nm{display:block;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.8px;color:#fff;}
.card .hint{display:block;font-size:12px;color:rgba(255,255,255,.45);margin-top:1px;}
.card .ch{color:rgba(255,255,255,.25);font-size:18px;}
.sym .fi{width:28px;height:28px;border-radius:8px;background:rgba(224,112,112,.12);border:1px solid rgba(224,112,112,.28);display:flex;align-items:center;justify-content:center;color:var(--wrong);font-size:14px;flex-shrink:0;}
.sym .nm{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;letter-spacing:0;}
/* diagnosis */
.dx-sym{display:inline-block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;color:var(--wrong);background:rgba(224,112,112,.12);padding:5px 11px;border-radius:7px;margin-bottom:14px;}
.dx h1{font-size:30px;margin-bottom:18px;}
.row{margin-bottom:18px;}
.k{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;margin-bottom:5px;}
.k.cause{color:var(--wrong);} .k.fix{color:var(--green);} .k.train{color:var(--gold);}
.v{font-size:15px;line-height:1.55;color:rgba(255,255,255,.88);}
.train-card{background:linear-gradient(135deg,rgba(200,168,75,.12),rgba(200,168,75,.03));border:1px solid rgba(200,168,75,.26);border-radius:13px;padding:14px 16px;}
.coach{font-size:13.5px;font-style:italic;color:rgba(255,255,255,.55);line-height:1.55;margin:18px 0;padding-left:13px;border-left:2px solid rgba(200,168,75,.4);}
.cta{width:100%;background:var(--green);color:#06140a;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1.4px;border:none;border-radius:13px;padding:15px;cursor:pointer;box-shadow:0 6px 22px rgba(91,186,111,.28);margin-top:6px;}
.cta:active{transform:scale(.98);}
.secondary{display:block;width:100%;text-align:center;background:none;border:none;color:rgba(255,255,255,.4);font-size:13px;font-weight:600;padding:16px;cursor:pointer;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<script>
const FIX_DATA = {"forehand":{"icon":"🎾","name":"The Forehand","faults":[{"symptom":"It sprays wide or long","cause":"You're contacting the ball late — behind your hip — so the racket face is still open when you hit it.","fix":"Start your turn earlier: shoulders round as the ball crosses the net, and meet it out in front.","train":"Catch-it-in-front: feed yourself easy balls and only swing if you can strike level with your front hip.","coach":"That's not your swing — it's your eyes and feet arriving late. Fix the turn, and the forehand you're capable of shows up."},{"symptom":"It feels weak — no pace","cause":"You're arming it. All arm, no body — so none of the ground force ever reaches the ball.","fix":"Let the legs and hips throw the arm. The arm is the last link in the chain, not the engine.","train":"Hit 20 forehands focusing only on pushing off the back leg. Ignore the arm entirely.","coach":"Stop muscling it. The hardest hitters look the most relaxed — because the power isn't in the arm they're swinging."},{"symptom":"It keeps hitting the net","cause":"You're decelerating — the swing dies at contact instead of accelerating through it.","fix":"Accelerate through the ball and finish high, racket up over the opposite shoulder.","train":"Shadow swings: every rep must finish with the racket framed over your shoulder. No short finishes allowed.","coach":"A ball into the net is almost never too much — it's a swing that gave up. Finish the thought."},{"symptom":"I fall backwards as I hit","cause":"You're hitting off the back foot, so your weight goes away from the target instead of into it.","fix":"Step in and land on your front foot at contact. Weight forward, into the court.","train":"Place a cone a half-step in front; you must step past it as you strike.","coach":"Tennis rewards players who move into the ball. Fall back and you're paying interest on every shot."}]},"oneHand":{"icon":"🤺","name":"One-Hand Backhand","faults":[{"symptom":"It floats weak and short","cause":"You're hitting it late, level with your body — by then a one-hander has no leverage left.","fix":"Make contact noticeably further in front than a forehand. Earlier turn, earlier strike.","train":"Drop-feed and only hit if the ball is clearly in front of your front foot. If it isn\\'t, let it go.","coach":"The one-hander gives you no second chances on timing. Get there early, and it sings. Arrive late, and it whimpers."},{"symptom":"It sprays across the court","cause":"Your chest is opening to the net too soon — the shoulder flies open and drags the ball with it.","fix":"Stay sideways through contact. Chest to the side fence, not the net, until the ball has gone.","train":"Hit with a ball under your back arm — it must stay pinned until contact. Keeps you closed.","coach":"A one-hander that opens early is a door left ajar. Stay shut a beat longer, and the ball goes where you aimed."},{"symptom":"No power, all arm","cause":"You're swinging with the arm alone, no leg drive up into the ball.","fix":"Bend the knees and drive up through contact — the power comes from low to high, ground to ball.","train":"Exaggerate: start in a deep knee bend, finish on your toes. Feel the lift.","coach":"The one-hander looks like an arm shot. It's a leg shot wearing a beautiful disguise."},{"symptom":"I lose my balance","cause":"Your off-arm is collapsing in front instead of counter-balancing behind you.","fix":"Throw the non-hitting arm back as you finish — it\\'s the rudder that keeps you upright.","train":"Shadow finishes: hold the spread for three seconds without wobbling.","coach":"Watch any great one-hander freeze at the finish. That stillness is the whole secret — and it's trainable."}]},"twoHand":{"icon":"🙌","name":"Two-Hand Backhand","faults":[{"symptom":"It feels stiff and short","cause":"You're blocking with both arms instead of driving with the body — no rotation, no length.","fix":"Rotate through it. Same hip-and-shoulder turn as a forehand, just with two hands on.","train":"Hit cross-court two-handers focusing only on turning your belt buckle to the target.","coach":"A two-hander isn't a bunt. Stiffen up and you've turned a weapon into a wall you can't hit through."},{"symptom":"No power on it","cause":"You're driving with your dominant (bottom) hand. For a righty, the top — left — hand is the engine.","fix":"Let the non-dominant hand lead the swing, like its own little forehand. Bottom hand just guides.","train":"Hit a bucket of left-hand-only forehands (righties). Feel which hand actually makes pace.","coach":"Most two-handers are secretly one good hand and one passenger. Wake up the hand that's asleep."},{"symptom":"It pops up too high","cause":"Your swing path is too flat or you\\'re leaning back, lifting the ball instead of driving it.","fix":"Low to high, but through the line of the ball. Stay over it; finish high, not backward.","train":"Target practice: every ball must land past the service line. Punishes the lazy lift.","coach":"Height is fine when you choose it. When the ball chooses it for you, that's a leak — plug it."},{"symptom":"It breaks down under pressure","cause":"You're shortening the swing when it matters — steering the ball instead of hitting it.","fix":"On the big point, commit to the same full, compact drive you use in the warm-up.","train":"Practise serving at 30-30 in your head, then hit your two-hander at full commitment anyway.","coach":"The two-hander's whole gift is that it holds under pressure — but only if you keep swinging it like you mean it."}]},"serve":{"icon":"🎯","name":"The Serve","faults":[{"symptom":"I double-fault under pressure","cause":"When the nerves come, you rush — the toss drops and gets pulled in, and the serve has nowhere to go.","fix":"Build a routine you repeat every time: bounce, breath, place the toss to the same spot. Same ritual, big point or not.","train":"Toss-and-catch: toss 10 balls and let each land. They must all land in a dinner-plate spot in front of your front foot.","coach":"The double fault isn't your serve failing — it's your trust failing. Rebuild the toss and you rebuild the trust."},{"symptom":"No power on it","cause":"You're muscling it with the arm and shoulder — the legs and the forearm pronation (the racket face rolling over) never get involved.","fix":"Drive UP with your legs, then let the forearm pronate — the racket rolls up and over the ball — at the top. (Don\\'t consciously \"snap\" the wrist; that just hurts it.)","train":"Serve focusing only on pushing up off both legs into the ball. Land inside the baseline on your front foot.","coach":"Power on the serve comes from the ground and the forearm rolling over, not the bicep — and never from a forced wrist flick."},{"symptom":"My serves keep going long","cause":"You're contacting the ball too low, in front of your face, so the racket face sends it out instead of down.","fix":"Toss a touch higher and hit UP at full stretch. The higher contact angles the ball down into the box.","train":"Reach drill: serve trying to scrape an imaginary ceiling. Full extension every time.","coach":"Reach for the sky and the ball goes down. Hit it bent-armed at your forehead and you're aiming up and praying."},{"symptom":"My toss is all over the place","cause":"You're flicking the ball up with your wrist and fingers, so it spins off in a new direction every time.","fix":"Lift with a straight arm from the shoulder and release at the top, fingers open. No wrist.","train":"Place the toss against a wall or fence line and groove the same release 30 times. Boring on purpose.","coach":"The toss is the one variable you own completely. Master this and the whole serve gets simple."}]},"volley":{"icon":"✋","name":"The Volley","faults":[{"symptom":"I swing and mis-hit","cause":"Too much backswing. By the time the racket comes through, the fast ball has already gone past your timing.","fix":"Start the racket in front of you and just catch the ball. The contact is the whole stroke.","train":"Stand a step from a wall and volley — there is literally no room to swing. Forces the catch.","coach":"A volley is a catch with strings on it. Every inch of backswing is an inch of trouble."},{"symptom":"My volleys sit up short","cause":"You're decelerating and stabbing — no forward momentum behind the ball.","fix":"Step in as you hit. The depth comes from your legs moving into the court, not the wrist.","train":"Volley only while walking forward through the ball. If your feet stop, start the rep again.","coach":"The punch comes from the legs, not the wrist. Move in, and the ball goes deep on its own."},{"symptom":"I'm always late on fast balls","cause":"Your racket is down or beside you between shots, so you start every volley from behind.","fix":"Split-step as they hit, and keep the racket up and in front the entire time you are at net.","train":"Shadow at the net: split, racket up, reset — never let the racket drop below your hands.","coach":"Be early or be eaten. At the net the racket lives in front of you, always ready."},{"symptom":"My wrist collapses","cause":"A loose wrist at contact folds under the pace and dumps the ball down.","fix":"Lock the wrist firm and meet the ball in front with a stable frame. Strong, not stiff.","train":"Volley a slightly heavier ball (or against pace) and focus only on the wrist staying firm.","coach":"A floppy wrist at the net is a free point handed back. Firm hand, brave step, simple shot."}]},"ret":{"icon":"🛡️","name":"The Return","faults":[{"symptom":"I keep getting aced or overpowered","cause":"Too big a backswing and a late split-step, so you simply never catch up to the ball.","fix":"Split-step exactly as they strike, and shorten your takeback to a compact block. Borrow their pace.","train":"Return practice with a rule: racket cannot go behind your back shoulder. Block only.","coach":"You don't have to out-hit a big serve. You have to make it play one more ball — and most servers hate that."},{"symptom":"My returns float short","cause":"You're blocking upward with no follow-through, so the ball lands soft and short — a gift.","fix":"Drive the block forward through the ball and aim deep and central. Depth takes away their angle.","train":"Return into the back third of the court only. Anything short of the service line doesn\\'t count.","coach":"Deep and boring beats short and fancy. A short return is the server's reward for serving at you."},{"symptom":"I guess and get it wrong","cause":"You're reacting blind instead of reading the toss and the server's patterns.","fix":"Watch the toss and where they\\'ve served before. Anticipation is reading, not gambling.","train":"Spend a return game just calling \"wide / body / T\" out loud off the toss before the ball lands.","coach":"Anticipation isn't guessing — it's reading. The toss and their habits tell you where it's going before it's hit."},{"symptom":"My second-serve returns are passive","cause":"You stay back and block the second serve the same as the first, handing the initiative back.","fix":"Step in on the weaker second serve and take it earlier — turn the return into an attack.","train":"On every second serve, your first step must be forward, inside the baseline. Then strike.","coach":"A weak second serve is a gift. Stop politely handing it back and start taking the court."}]},"overhead":{"icon":"☄️","name":"The Overhead","faults":[{"symptom":"I shank the easy one","cause":"You watch the ball drop without preparing, then rush a panicked swing at the last second.","fix":"Turn sideways and get the racket up the instant you see the lob. Point at the ball. Then it\\'s just a serve.","train":"Practise overheads from feeds, preparing the racket before the ball even peaks. Slow feet, early racket.","coach":"The smash misses because it looks easy. Treat it like the serve you've hit a thousand times and it stops being scary."},{"symptom":"I let it drop too low","cause":"You back up late and flat-footed, so the ball falls below your strike zone.","fix":"Move back early with small, quick steps and get behind the ball. Take it high, out in front.","train":"Have someone lob deep; you must shuffle back and contact every ball above your head.","coach":"Get behind it early. A high contact is a confident smash; a low one is a hopeful slap."},{"symptom":"It flies long","cause":"You're leaning back and hitting flat, contacting the ball behind your head.","fix":"Stay over the ball, contact it in front of you, and snap slightly down and through.","train":"Aim every overhead to land inside the service line. Punishes the lean-back.","coach":"Contact in front, not behind your head. Lean back and you're serving to the back fence."},{"symptom":"I panic and rush it","cause":"No routine — adrenaline takes over on the \"easy\" ball and your feet and hands speed up.","fix":"Slow down. Same routine as your serve: set, breathe, reach. The ball is waiting for you.","train":"Say \"turn… point… reach\" out loud on every practice smash to force the routine.","coach":"Slow your feet, and the smash slows down with them. The easy ball only punishes the player in a hurry."}]},"slice":{"icon":"🔪","name":"The Backhand Slice","faults":[{"symptom":"It floats and sits up","cause":"You\\'re chopping straight down with an open face and no forward drive, so the ball balloons.","fix":"Carve high-to-low but extend FORWARD through the ball, toward your target. Out, not just down.","train":"Slice over a low target (a row of cones) — the ball must stay below head height and land deep.","coach":"A slice is a carve, not a chop. Cut forward through it and the ball knifes low instead of floating up."},{"symptom":"I have no control over it","cause":"You're slicing with a flicky wrist instead of a firm hand and a turning shoulder.","fix":"Keep the wrist firm and let the shoulder and arm carve as a unit. Stay sideways through contact.","train":"Slice with your off-hand staying back the whole time — it keeps you sideways and steady.","coach":"Let the shoulder do the cutting, not the wrist. A steady frame gives the slice its bite."},{"symptom":"It dies short in the net","cause":"No follow-through — the racket stops at contact instead of extending out toward the target.","fix":"Finish with the racket reaching forward, out in front, toward where you want the ball to go.","train":"Exaggerate the extension: every slice must finish with the arm long and the racket pointing at your target.","coach":"Finish out front, toward your target. A slice with no follow-through is a shot that changed its mind."},{"symptom":"It pops up off low balls","cause":"You open the face too much and stand up out of the shot, lifting the ball instead of driving it.","fix":"Keep the face firmer and stay down with the ball through contact. Bend the knees, stay level.","train":"Slice low feeds from a deep knee bend, keeping your head and chest down past contact.","coach":"Stay down with the ball. The moment you stand up out of it, the slice stands up too — and sits up for them."}]}};
const ORDER=['forehand','oneHand','twoHand','serve','volley','ret','overhead','slice'];
let curStroke=null, curFault=null;
const app=()=>document.getElementById('app');

function topBar(showBack){
  return '<div class="top">'+(showBack?'<div class="back" onclick="goBack()">←</div>':'')+'<div class="brand">GAMESHARP · FIX A SHOT</div><div class="poc">Prototype</div></div>';
}
function renderHome(){
  curStroke=null;curFault=null;
  const cards=ORDER.map(k=>{const s=FIX_DATA[k];const hint=s.faults[0].symptom.replace(/^It |^I |^My /,'').toLowerCase();
    return '<button class="card" onclick="openStroke(\''+k+'\')"><span class="ic">'+s.icon+'</span><span class="tx"><span class="nm">'+s.name.replace('The ','')+'</span><span class="hint">e.g. “'+hint+'” · 4 fixes</span></span><span class="ch">›</span></button>';
  }).join('');
  app().innerHTML=topBar(false)+'<div class="fade"><div class="eyebrow">Your private coach</div><h1>FIX A SHOT</h1><p class="sub">Which shot is costing you points? Pick it — then tell us how it misses, and we\'ll find the leak.</p>'+cards+'</div>';
}
function openStroke(k){
  curStroke=k;curFault=null;const s=FIX_DATA[k];
  const cards=s.faults.map((f,i)=>'<button class="card sym" onclick="openFault('+i+')"><span class="fi">✗</span><span class="tx"><span class="nm">'+f.symptom+'</span></span><span class="ch">›</span></button>').join('');
  app().innerHTML=topBar(true)+'<div class="fade"><div class="eyebrow">'+s.icon+' '+s.name+'</div><h1>WHAT DOES <em>YOUR</em> '+s.name.replace('The ','').toUpperCase()+' DO?</h1><p class="sub">Tap the miss that sounds like yours. No judgement — every player has one.</p>'+cards+'</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}
function openFault(i){
  curFault=i;const s=FIX_DATA[curStroke];const f=s.faults[i];
  app().innerHTML=topBar(true)+'<div class="fade dx"><div class="dx-sym">'+s.icon+' “'+f.symptom+'”</div>'
    +'<div class="row"><div class="k cause">The coach sees</div><div class="v">'+f.cause+'</div></div>'
    +'<div class="row"><div class="k fix">The fix</div><div class="v">'+f.fix+'</div></div>'
    +'<div class="row train-card"><div class="k train">Train it</div><div class="v">'+f.train+'</div></div>'
    +'<div class="coach">“'+f.coach+'”</div>'
    +'<button class="cta" onclick="alert(\'In the app this loads a '+s.name.replace('The ','')+' challenge built around this fix.\')">Test it in a challenge →</button>'
    +'<button class="secondary" onclick="openStroke(curStroke)">← Try another '+s.name.replace('The ','').toLowerCase()+' miss</button></div>';
  window.scrollTo({top:0,behavior:'smooth'});
}
function goBack(){ if(curFault!=null) openStroke(curStroke); else renderHome(); }
renderHome();
</script>
</body>
</html>
