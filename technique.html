<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GAMESHARP · Technique Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#0d1a0f; --panel:#101f12; --green:#5bba6f; --gold:#c8a84b;
  --fig:#e9f0e1; --wrong:#e07070; --line:rgba(255,255,255,.1);
  --ease-out-quint:cubic-bezier(0.22,1,0.36,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--dark);color:#fff;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:560px;margin:0 auto;padding:0 20px 60px;}

.tc-top{display:flex;align-items:center;justify-content:space-between;padding:46px 0 0;}
.tc-brand{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--green);}
.tc-poc{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.28);font-weight:700;}

/* stroke switcher */
.stroke-nav{display:flex;gap:8px;margin:20px -20px 4px;padding:0 20px 4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.stroke-nav::-webkit-scrollbar{display:none;}
.sn-chip{flex:0 0 auto;min-width:92px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:12px;
  padding:11px 12px 9px;text-align:center;cursor:pointer;transition:.18s;}
.sn-chip .si{font-size:18px;line-height:1;}
.sn-chip .sl{display:block;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.6px;margin-top:4px;color:rgba(255,255,255,.6);}
.sn-chip.on{border-color:var(--green);background:rgba(91,186,111,.13);box-shadow:0 0 0 1px var(--green);}
.sn-chip.on .sl{color:#fff;}
.sn-chip:active{transform:scale(.97);}

.lesson{animation:fade .4s var(--ease-out-quint);}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.tc-eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--green);font-weight:700;margin:24px 0 8px;}
.tc-title{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:1.5px;line-height:.95;margin:0 0 12px;}
.tc-intent{font-size:15px;line-height:1.55;color:rgba(255,255,255,.62);margin-bottom:22px;}

.stage{position:relative;background:radial-gradient(130% 120% at 50% 28%,#16401d 0%,#0e2913 55%,#081710 100%);
  border-radius:18px;overflow:hidden;box-shadow:inset 0 0 50px rgba(0,0,0,.5);}
.stage svg{display:block;width:100%;height:auto;}
.phase-tag{position:absolute;top:14px;left:16px;z-index:3;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  font-weight:800;color:var(--gold);background:rgba(0,0,0,.35);padding:4px 9px;border-radius:6px;}
.frame-cue{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:54px 18px 16px;
  background:linear-gradient(to top, rgba(6,16,9,.96) 52%, rgba(6,16,9,.6) 78%, transparent);}
.frame-cue .fc-cue{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:.6px;color:#fff;line-height:1.05;}
.frame-cue .fc-cap{font-size:12.5px;font-style:italic;color:rgba(233,240,225,.66);margin-top:4px;line-height:1.4;}

.tabs{display:flex;gap:8px;margin:14px 0 0;}
.tab{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:11px;padding:11px 6px;text-align:center;cursor:pointer;transition:.18s;}
.tab .tn{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.8px;color:#fff;}
.tab .ts{display:block;font-size:9.5px;color:rgba(255,255,255,.4);margin-top:1px;letter-spacing:.3px;}
.tab.on{border-color:var(--green);background:rgba(91,186,111,.13);box-shadow:0 0 0 1px var(--green);}
.tab:active{transform:scale(.97);}
.play-row{display:flex;justify-content:center;margin-top:12px;}
.play-btn{background:rgba(255,255,255,.06);border:1px solid var(--line);color:rgba(255,255,255,.75);font-size:12px;font-weight:700;letter-spacing:.4px;padding:8px 18px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.18s;}
.play-btn:active{transform:scale(.97);}
.play-hint{font-size:10.5px;color:rgba(255,255,255,.3);text-align:center;margin-top:8px;}

.hero-cue{margin:26px 0 0;background:linear-gradient(135deg,rgba(91,186,111,.14),rgba(91,186,111,.04));border:1px solid rgba(91,186,111,.28);border-radius:14px;padding:16px 18px;}
.hero-cue .hc-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--green);font-weight:800;margin-bottom:6px;}
.hero-cue .hc-txt{font-family:'Bebas Neue',sans-serif;font-size:27px;letter-spacing:1.4px;color:#fff;}
.hero-cue .hc-sub{font-size:12.5px;color:rgba(255,255,255,.5);margin-top:5px;line-height:1.4;}

.sec-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:700;margin:30px 0 12px;}

.coach-eye{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:18px;}
.coach-eye .ce-head{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
.coach-eye .ce-badge{width:30px;height:30px;border-radius:50%;background:rgba(200,168,75,.16);display:flex;align-items:center;justify-content:center;font-size:15px;}
.coach-eye .ce-ttl{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--gold);}
.coach-eye .ce-body{font-size:14.5px;line-height:1.62;color:rgba(255,255,255,.82);}

.fault{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.fault-q{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;}
.fault-q .fi{width:26px;height:26px;border-radius:7px;background:rgba(224,112,112,.14);border:1px solid rgba(224,112,112,.3);display:flex;align-items:center;justify-content:center;color:var(--wrong);font-size:13px;flex-shrink:0;}
.fault-q .fq{flex:1;font-size:14.5px;font-weight:600;color:#fff;}
.fault-q .fc{color:rgba(255,255,255,.3);font-size:18px;transition:transform .25s;}
.fault.open .fault-q .fc{transform:rotate(180deg);}
.fault-body{max-height:0;overflow:hidden;transition:max-height .35s var(--ease-out-quint);}
.fault.open .fault-body{max-height:420px;}
.fault-inner{padding:0 16px 16px;}
.fb-row{margin-bottom:11px;}
.fb-k{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;margin-bottom:3px;}
.fb-k.cause{color:var(--wrong);} .fb-k.fix{color:var(--green);} .fb-k.train{color:var(--gold);}
.fb-v{font-size:13.5px;line-height:1.5;color:rgba(255,255,255,.8);}
.fb-coach{font-size:12.5px;font-style:italic;color:rgba(255,255,255,.52);margin-top:10px;padding-top:10px;border-top:1px solid var(--line);line-height:1.45;}

.drill{background:linear-gradient(135deg,rgba(200,168,75,.12),rgba(200,168,75,.03));border:1px solid rgba(200,168,75,.26);border-radius:14px;padding:17px 18px;}
.drill .dl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:7px;}
.drill .dt{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.8px;color:#fff;margin-bottom:6px;}
.drill .db{font-size:13.5px;line-height:1.55;color:rgba(255,255,255,.72);}

.bridge{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.18s;}
.bridge:active{transform:scale(.99);}
.bridge .br-ic{font-size:22px;}
.bridge .br-tx{flex:1;}
.bridge .br-e{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);font-weight:700;}
.bridge .br-t{font-size:15px;font-weight:700;color:#fff;margin-top:2px;}
.bridge .br-a{color:var(--green);font-size:20px;}

@keyframes cdot{0%,100%{r:9;opacity:.95;}50%{r:13;opacity:.55;}}
.cdot{animation:cdot 1.6s ease-in-out infinite;}
</style>
</head>
<body>
<div class="wrap">
  <div class="tc-top">
    <div class="tc-brand">GAMESHARP · TECHNIQUE COACH</div>
    <div class="tc-poc">Proof of concept</div>
  </div>
  <div class="stroke-nav" id="strokeNav"></div>
  <div class="lesson" id="lesson"></div>
</div>

<script>
/* ──────────────────────────────────────────────────────────────────────────
   FUTURE-PROOFING: every stroke is authored as ordered KEYFRAMES of POSE DATA
   (joint keypoints) + a phase-anchored ANNOTATION overlay, behind a visualMode
   flag. Today a "stills" renderer draws annotated frames and a keyframe
   interpolation ("Play"). The SAME data feeds a future motion / AI-video /
   pose renderer — swap the renderer, never re-author the content.
   ────────────────────────────────────────────────────────────────────────── */
const VIEW = { w:300, h:340, ground:302 };

/* ── render helpers ── */
function limb(a,b,w){ return `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="var(--fig)" stroke-width="${w||11}" stroke-linecap="round"/>`; }
function arrow(x1,y1,x2,y2,col,w){
  const ang=Math.atan2(y2-y1,x2-x1), L=9;
  const ax=x2-L*Math.cos(ang-0.5), ay=y2-L*Math.sin(ang-0.5);
  const bx=x2-L*Math.cos(ang+0.5), by=y2-L*Math.sin(ang+0.5);
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w||4}" stroke-linecap="round"/>
    <path d="M${x2},${y2} L${ax},${ay} M${x2},${y2} L${bx},${by}" stroke="${col}" stroke-width="${w||4}" stroke-linecap="round" fill="none"/>`;
}
function figure(p){
  // two-handed if oWr sits near the racket handle
  return `<g opacity="0.96">
    ${limb(p.hip,p.bKnee)}${limb(p.bKnee,p.bAnk)}
    ${limb(p.hip,p.fKnee)}${limb(p.fKnee,p.fAnk)}
    ${limb(p.sh,p.hip,12)}
    ${limb(p.sh,p.oElb)}${limb(p.oElb,p.oWr)}
    ${limb(p.sh,p.elb)}${limb(p.elb,p.wr)}
    <line x1="${p.wr[0]}" y1="${p.wr[1]}" x2="${p.rkt[0]}" y2="${p.rkt[1]}" stroke="var(--gold)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="${p.rkt[0]}" cy="${p.rkt[1]}" r="13" fill="none" stroke="var(--gold)" stroke-width="3"/>
    <line x1="${p.sh[0]}" y1="${p.sh[1]}" x2="${p.head[0]}" y2="${p.head[1]+12}" stroke="var(--fig)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="${p.head[0]}" cy="${p.head[1]}" r="15" fill="var(--fig)"/>
  </g>`;
}
function floor(){ return `<line x1="34" y1="${VIEW.ground+2}" x2="266" y2="${VIEW.ground+2}" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
  <ellipse cx="150" cy="${VIEW.ground+6}" rx="118" ry="10" fill="rgba(0,0,0,.25)"/>`; }

/* overlay snippets */
function oPower(p){ return `${arrow(p.bAnk[0],p.bAnk[1]-4,p.hip[0],p.hip[1]+6,'rgba(91,186,111,.55)',6)}
  <text x="${p.bAnk[0]-2}" y="${(p.bAnk[1]+p.hip[1])/2}" fill="rgba(91,186,111,.9)" font-size="9" font-weight="700" font-family="DM Sans" text-anchor="end" transform="rotate(-78 ${p.bAnk[0]-2} ${(p.bAnk[1]+p.hip[1])/2})">POWER</text>`; }
function oContact(cx,cy,brushFrom){ const a = brushFrom ? arrow(cx-4,cy+22,cx+8,cy-18,'rgba(234,255,150,.8)',4)+`<text x="${cx-12}" y="${cy-20}" text-anchor="end" fill="rgba(234,255,150,.85)" font-size="8.5" font-weight="700" font-family="DM Sans">brush up</text>` : '';
  return `${a}<circle class="cdot" cx="${cx}" cy="${cy}" r="9" fill="rgba(234,255,150,.9)"/>
  <text x="${cx}" y="${cy+30}" fill="rgba(255,255,255,.7)" font-size="9" font-weight="700" font-family="DM Sans" text-anchor="middle">CONTACT</text>`; }
function oBalance(x){ return `<line x1="${x-16}" y1="306" x2="${x+16}" y2="306" stroke="rgba(91,186,111,.7)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="${x}" y="320" fill="rgba(91,186,111,.7)" font-size="8" font-family="DM Sans" text-anchor="middle">balanced</text>`; }
function oCatch(p,label){ return `<circle cx="${p.oWr[0]}" cy="${p.oWr[1]}" r="7" fill="none" stroke="var(--green)" stroke-width="1.8"/>
  <text x="${p.oWr[0]-12}" y="${p.oWr[1]-6}" fill="rgba(91,186,111,.9)" font-size="8.5" font-weight="700" font-family="DM Sans" text-anchor="end">${label||'catch it'}</text>`; }
function oBall(x,y){ return `<circle cx="${x}" cy="${y}" r="7" fill="#eaff96" stroke="rgba(0,0,0,.25)" stroke-width="1"/>`; }
function oLabel(x,y,txt,col,anchor){ return `<text x="${x}" y="${y}" fill="${col||'rgba(91,186,111,.85)'}" font-size="8.5" font-weight="700" font-family="DM Sans" text-anchor="${anchor||'middle'}">${txt}</text>`; }

/* ════════════════ STROKE LIBRARY ════════════════ */
const STROKES = {
  forehand:{
    nav:{icon:'🎾', label:'Forehand'},
    cat:'Strike · Groundstrokes', name:'The Forehand',
    intent:"Your forehand is your weapon. Built right, it's free power. Built wrong, it's your biggest source of errors. Let's build it right.",
    poses:{
      load:{head:[150,70],sh:[150,102],hip:[152,172],elb:[124,130],wr:[108,156],rkt:[84,186],oElb:[180,120],oWr:[210,130],bKnee:[130,236],bAnk:[124,302],fKnee:[178,240],fAnk:[194,302]},
      drop:{head:[150,70],sh:[150,102],hip:[150,170],elb:[150,126],wr:[172,150],rkt:[160,188],oElb:[136,116],oWr:[116,134],bKnee:[132,237],bAnk:[122,301],fKnee:[178,239],fAnk:[193,301]},
      contact:{head:[152,70],sh:[152,102],hip:[150,170],elb:[184,124],wr:[214,128],rkt:[242,108],oElb:[124,124],oWr:[100,146],bKnee:[134,238],bAnk:[118,302],fKnee:[178,240],fAnk:[190,302]},
      finish:{head:[150,70],sh:[150,100],hip:[150,168],elb:[138,96],wr:[114,78],rkt:[94,56],oElb:[126,108],oWr:[102,72],bKnee:[150,242],bAnk:[150,302],fKnee:[172,238],fAnk:[184,302]}
    },
    frames:[
      {key:'load',label:'Load',sub:'Coil & weight back',cue:'Turn your shoulders before the ball bounces.',cap:"Power doesn't start in your arm. It starts in the ground.",
        overlay:p=>oPower(p)+`<circle cx="${p.oWr[0]}" cy="${p.oWr[1]}" r="6" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="1.5"/><text x="${p.oWr[0]+12}" y="${p.oWr[1]+3}" fill="rgba(255,255,255,.5)" font-size="8.5" font-family="DM Sans">point at the ball</text>`},
      {key:'drop',label:'Drop',sub:'Lag & whip',cue:'Let the racket head drop below the ball — that lag is your topspin.',cap:"Don't muscle it from the top. Let the racket fall, then whip up through the ball.",
        overlay:p=>oLabel(p.rkt[0]-2,p.rkt[1]+20,'racket drops below','rgba(91,186,111,.85)')+arrow(p.rkt[0]+6,p.rkt[1]-8,p.rkt[0]+44,p.rkt[1]-72,'rgba(91,186,111,.7)',3)},
      {key:'contact',label:'Contact',sub:'Out in front',cue:'Meet it in front of your hip — brush up the back of the ball.',cap:'Late is weak. In front is free power.',
        overlay:p=>oContact(p.rkt[0]+2,p.wr[1]+4,true)},
      {key:'finish',label:'Finish',sub:'High & balanced',cue:'Finish high — catch the racket over your shoulder.',cap:'Catch it over the shoulder for a clean drive — that\'s your balance baseline. For heavy topspin off a low or fast ball, let it wrap across your body instead — the "windshield wiper".',
        overlay:p=>`<path d="M 238,140 Q 200,60 ${p.rkt[0]+6},${p.rkt[1]+6}" fill="none" stroke="rgba(91,186,111,.5)" stroke-width="2.5" stroke-dasharray="5,4"/>`+oCatch(p)+oBalance(p.fAnk[0])}
    ],
    hero:{txt:'Turn · Step · Brush · Catch', sub:'Four beats. The whole forehand, in a rhythm you can say to yourself before you swing.'},
    coach:{title:'A week without a racket', body:`A coach in Valencia had a teenager who hit the ball as hard as anyone alive — and missed twice as often. He took the kid's racket away for a week. Made him shadow-swing in a mirror, catching the racket over his shoulder, again and again. <em>"You don't have a forehand problem,"</em> he told him. <em>"You have a finish problem — and a clean finish means everything before it was right."</em> The kid stopped trying to murder the ball and started holding his finish. The pace didn't drop. The errors did.`},
    faults:[
      {symptom:'It sprays wide or long',cause:"You're contacting the ball late — behind your hip — so the racket face is still open when you hit it.",fix:'Start your turn earlier: shoulders round as the ball crosses the net, and meet it out in front.',train:'Catch-it-in-front: feed yourself easy balls and only swing if you can strike level with your front hip.',coach:"That's not your swing — it's your eyes and feet arriving late. Fix the turn, and the forehand you're capable of shows up."},
      {symptom:'It feels weak — no pace',cause:"You're arming it. All arm, no body — so none of the ground force ever reaches the ball.",fix:'Let the legs and hips throw the arm. The arm is the last link in the chain, not the engine.',train:'Hit 20 forehands focusing only on pushing off the back leg. Ignore the arm entirely.',coach:"Stop muscling it. The hardest hitters look the most relaxed — because the power isn't in the arm they're swinging."},
      {symptom:'It keeps hitting the net',cause:"You're decelerating — the swing dies at contact instead of accelerating through it.",fix:'Accelerate through the ball and finish high, racket up over the opposite shoulder.',train:'Shadow swings: every rep must finish with the racket framed over your shoulder. No short finishes allowed.',coach:"A ball into the net is almost never too much — it's a swing that gave up. Finish the thought."},
      {symptom:'I fall backwards as I hit',cause:"You're hitting off the back foot, so your weight goes away from the target instead of into it.",fix:'Step in and land on your front foot at contact. Weight forward, into the court.',train:'Place a cone a half-step in front; you must step past it as you strike.',coach:"Tennis rewards players who move into the ball. Fall back and you're paying interest on every shot."}
    ],
    drill:{dt:'Shadow Finish — 3 × 10', db:"No ball. Slow forehand swings, freezing the finish over your shoulder for a two-count. Then 10 more with a ball-drop. You're training the <strong>finish</strong> — which quietly trains everything before it."},
    bridge:{e:'Now put it to work', t:'The Short-Ball Read — when do you let it go?'}
  },

  oneHand:{
    nav:{icon:'🤺', label:'1H Backhand'},
    cat:'Strike · Groundstrokes', name:'One-Hand Backhand',
    intent:"The one-hander is a signature — beautiful, penetrating, and unforgiving. Hit it right and it's the best ball you own. Hit it late and it's the first thing to break. Let's make it reliable.",
    poses:{
      load:{head:[150,70],sh:[150,102],hip:[150,172],elb:[126,128],wr:[106,152],rkt:[82,180],oElb:[122,138],oWr:[100,160],bKnee:[176,238],bAnk:[192,302],fKnee:[130,238],fAnk:[122,302]},
      drop:{head:[150,70],sh:[150,102],hip:[150,170],elb:[142,126],wr:[150,152],rkt:[138,188],oElb:[140,134],oWr:[118,156],bKnee:[176,238],bAnk:[192,302],fKnee:[130,238],fAnk:[122,302]},
      contact:{head:[152,70],sh:[152,102],hip:[150,170],elb:[186,118],wr:[216,118],rkt:[246,98],oElb:[126,130],oWr:[104,152],bKnee:[178,240],bAnk:[190,302],fKnee:[130,240],fAnk:[118,302]},
      finish:{head:[150,68],sh:[150,100],hip:[150,168],elb:[188,94],wr:[220,76],rkt:[248,56],oElb:[118,122],oWr:[88,144],bKnee:[170,240],bAnk:[182,302],fKnee:[140,240],fAnk:[132,302]}
    },
    frames:[
      {key:'load',label:'Load',sub:'Turn your back',cue:'Show your back to the net — both hands take it back and low.',cap:'The one-hander lives or dies on the turn. Coil early.',
        overlay:p=>`<text x="${p.rkt[0]-4}" y="${p.rkt[1]+24}" fill="rgba(91,186,111,.8)" font-size="8.5" font-weight="700" font-family="DM Sans" text-anchor="middle">low & back</text>`+oPower(p)},
      {key:'drop',label:'Drop',sub:'Lag & whip',cue:'Let the racket drop below the ball, then drive low-to-high through it.',cap:"The lag loads the topspin. Don't yank it from the top — let it fall, then climb.",
        overlay:p=>oLabel(p.rkt[0],p.rkt[1]+20,'racket drops','rgba(91,186,111,.85)')+arrow(p.rkt[0]+6,p.rkt[1]-8,p.rkt[0]+48,p.rkt[1]-70,'rgba(91,186,111,.7)',3)},
      {key:'contact',label:'Contact',sub:'Way out in front',cue:'Strike it further in front than feels natural — the one-hander demands it.',cap:'Forehands forgive late. One-handers punish it.',
        overlay:p=>oContact(p.rkt[0]+2,p.wr[1]+4,true)},
      {key:'finish',label:'Finish',sub:'Spread the wings',cue:'Drive up and through — let the off-hand fly back behind you.',cap:'The spread isn\'t for show. It\'s the proof you stayed sideways and balanced.',
        overlay:p=>oCatch(p,'let it fly')+oBalance(p.fAnk[0])+`<text x="${p.rkt[0]}" y="${p.rkt[1]-18}" fill="rgba(91,186,111,.8)" font-size="8.5" font-weight="700" font-family="DM Sans" text-anchor="middle">up & through</text>`}
    ],
    hero:{txt:'Turn · Reach · Lift · Spread', sub:'The one-hander is a commitment. Decide early, swing free, and wear the misses like a player who chose to play beautifully.'},
    coach:{title:'The signature shot', body:`They told the kid in Stuttgart the one-hander was a luxury he couldn't afford. His coach disagreed. <em>"The two-hander is a fortress,"</em> he said. <em>"The one-hander is a signature. It will betray you on the days your feet are slow — and on the days they aren't, it's the most beautiful shot in the game, and it's yours alone."</em> He taught it not as a stroke but as a decision: commit early, swing free, and never apologise for the misses. The kid kept the one-hander. People remembered it long after they forgot the score.`},

    coach:{title:'The toss never lies', body:`A coach in Lyon had a player who double-faulted every time the score got tight. He filmed it. <em>"Your serve is fine,"</em> he said. <em>"Watch your toss."</em> Under pressure, the toss crept lower and the serve followed it down. <em>"The serve is the only shot you hit on your own terms — no one can rush it. The toss is your tell. Fix the toss, and you fix the nerve."</em> The player learned to take an extra breath and place the ball the same way every time. The double faults didn't fade slowly. They stopped.`},

      {symptom:'My serves keep going long',cause:"You're contacting the ball too low, in front of your face, so the racket face sends it out instead of down.",fix:'Toss a touch higher and hit UP at full stretch. The higher contact angles the ball down into the box.',train:'Reach drill: serve trying to scrape an imaginary ceiling. Full extension every time.',coach:"Reach for the sky and the ball goes down. Hit it bent-armed at your forehead and you're aiming up and praying."},

    ],
    drill:{dt:'Toss-and-Catch — 3 × 10', db:"No racket. Toss the ball with a straight arm and let it drop — it must land in a small spot just inside your front foot, the same place every time. You're grooving the one thing that decides your whole serve."},

      {symptom:'It flies long',cause:"You're leaning back and hitting flat, contacting the ball behind your head.",fix:'Stay over the ball, contact it in front of you, and snap slightly down and through.',train:'Aim every overhead to land inside the service line. Punishes the lean-back.',coach:"Contact in front, not behind your head. Lean back and you're serving to the back fence."},
      {symptom:'I panic and rush it',cause:'No routine — adrenaline takes over on the "easy" ball and your feet and hands speed up.',fix:'Slow down. Same routine as your serve: set, breathe, reach. The ball is waiting for you.',train:'Say "turn… point… reach" out loud on every practice smash to force the routine.',coach:"Slow your feet, and the smash slows down with them. The easy ball only punishes the player in a hurry."}
    ],
    drill:{dt:'Serve-the-Lob — 3 × 8', db:"Have someone feed lobs. Treat each one exactly like a serve: turn sideways, point at the ball, reach up and punch. The goal isn't power — it's making the easy ball feel as routine as your service motion."},
    bridge:{e:'Now put it to work', t:'Net Pressure — forcing the weak lob'}
  },

  slice:{

      contact:{head:[151,72],sh:[151,104],hip:[150,172],elb:[178,118],wr:[206,124],rkt:[232,114],oElb:[128,118],oWr:[106,138],bKnee:[176,240],bAnk:[188,302],fKnee:[132,240],fAnk:[120,302]},
      finish:{head:[150,72],sh:[150,102],hip:[150,170],elb:[196,108],wr:[226,104],rkt:[252,98],oElb:[120,120],oWr:[96,140],bKnee:[170,240],bAnk:[182,302],fKnee:[138,240],fAnk:[130,302]}

      {key:'load',label:'Load',sub:'High & back',cue:'Turn sideways and set the racket high — above the ball, knees bent.',cap:'The slice starts above the ball. You\'re about to carve down and through it.',

/* ════════════════ ENGINE ════════════════ */
let curStroke='forehand', current=0, playing=false;

function renderNav(){
  document.getElementById('strokeNav').innerHTML = Object.keys(STROKES).map(k=>{
    const s=STROKES[k];
    return `<div class="sn-chip ${k===curStroke?'on':''}" onclick="switchStroke('${k}')"><span class="si">${s.nav.icon}</span><span class="sl">${s.nav.label}</span></div>`;
  }).join('');
}
function switchStroke(k){ if(k===curStroke) return; curStroke=k; current=0; playing=false; renderNav(); renderLesson(); window.scrollTo({top:0,behavior:'smooth'}); }

function renderLesson(){
  const s=STROKES[curStroke];
  document.getElementById('lesson').innerHTML = `
    <div class="tc-eyebrow">${s.cat}</div>
    <h1 class="tc-title">${s.name}</h1>
    <p class="tc-intent">${s.intent}</p>
    <div class="stage" id="stage"></div>
    <div class="tabs" id="tabs"></div>
    <div class="play-row"><button class="play-btn" onclick="playSwing()">▶ Play the swing</button></div>
    <div class="play-hint">Tap a phase to study it · same key-frames the swing is built from</div>
    <div class="hero-cue"><div class="hc-lbl">The one cue</div><div class="hc-txt">${s.hero.txt}</div><div class="hc-sub">${s.hero.sub}</div></div>
    <div class="sec-lbl">The Coach's Eye</div>
    <div class="coach-eye"><div class="ce-head"><div class="ce-badge">👁️</div><div class="ce-ttl">${s.coach.title}</div></div><div class="ce-body">${s.coach.body}</div></div>
    <div class="sec-lbl">What does <em>your</em> ${s.nav.label.toLowerCase().replace('1h ','').replace('2h ','')} do?</div>
    <div id="faults"></div>
    <div class="sec-lbl">This week's drill</div>
    <div class="drill"><div class="dl">Homework · 10 minutes</div><div class="dt">${s.drill.dt}</div><div class="db">${s.drill.db}</div></div>
    <div class="bridge" onclick="alert('In the full app, this opens the linked decision lesson.')"><div class="br-ic">🎾</div><div class="br-tx"><div class="br-e">${s.bridge.e}</div><div class="br-t">${s.bridge.t}</div></div><div class="br-a">→</div></div>
  `;
  renderTabs(); renderStage(); renderFaults();
}
function renderTabs(){
  const s=STROKES[curStroke];
  document.getElementById('tabs').innerHTML = s.frames.map((f,i)=>`<div class="tab" onclick="goFrame(${i})"><div class="tn">${f.label}</div><span class="ts">${f.sub}</span></div>`).join('');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on', i===current));
}
function renderStage(){
  const s=STROKES[curStroke], f=s.frames[current], p=s.poses[f.key];
  document.getElementById('stage').innerHTML = `
    <div class="phase-tag">${current+1}/${s.frames.length} · ${f.label}</div>
    <svg viewBox="0 0 ${VIEW.w} ${VIEW.h}">${floor()}${f.overlay(p)}${figure(p)}</svg>
    <div class="frame-cue"><div class="fc-cue">${f.cue}</div><div class="fc-cap">${f.cap}</div></div>`;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on', i===current));
}
function goFrame(i){ if(playing) return; current=i; renderStage(); }
function renderFaults(){
  const s=STROKES[curStroke];
  document.getElementById('faults').innerHTML = s.faults.map((f,i)=>`
    <div class="fault" id="fault${i}">
      <div class="fault-q" onclick="toggleFault(${i})"><div class="fi">✗</div><div class="fq">${f.symptom}</div><div class="fc">⌄</div></div>
      <div class="fault-body"><div class="fault-inner">
        <div class="fb-row"><div class="fb-k cause">The coach sees</div><div class="fb-v">${f.cause}</div></div>
        <div class="fb-row"><div class="fb-k fix">The fix</div><div class="fb-v">${f.fix}</div></div>
        <div class="fb-row"><div class="fb-k train">Train it</div><div class="fb-v">${f.train}</div></div>
        <div class="fb-coach">“${f.coach}”</div>
      </div></div>
    </div>`).join('');
}
function toggleFault(i){
  const el=document.getElementById('fault'+i), wasOpen=el.classList.contains('open');
  document.querySelectorAll('.fault').forEach(f=>f.classList.remove('open'));
  if(!wasOpen) el.classList.add('open');
}

/* Play: interpolate keyframes (stills -> motion, same data) */
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpPose(A,B,t){ const o={}; for(const k in A) o[k]=[lerp(A[k][0],B[k][0],t),lerp(A[k][1],B[k][1],t)]; return o; }
function easeInOut(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function playSwing(){
  if(playing) return; playing=true;
  const s=STROKES[curStroke], keys=s.frames.map(f=>f.key), N=keys.length, segs=Math.max(1,N-1);
  const stage=document.getElementById('stage'), dur=400+segs*420, t0=performance.now();
  clearTimeout(playSwing._t); playSwing._t=setTimeout(()=>{ if(playing){playing=false;current=N-1;renderStage();} }, dur+400);
  function step(now){
    let u=(now-t0)/dur; if(u>1)u=1;
    const fpos=u*segs, seg=Math.min(segs-1,Math.floor(fpos)), local=easeInOut(fpos-seg);
    const p=lerpPose(s.poses[keys[seg]], s.poses[keys[seg+1]], local);
    stage.innerHTML=`<div class="phase-tag">Swing</div><svg viewBox="0 0 ${VIEW.w} ${VIEW.h}">${floor()}${figure(p)}</svg>`;
    if(u<1) requestAnimationFrame(step); else { playing=false; current=N-1; renderStage(); }
  }
  requestAnimationFrame(step);
}

renderNav(); renderLesson();
</script>
